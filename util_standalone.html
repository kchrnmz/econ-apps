    <script>
        // Embedded Module: utilityMath.js
        // Utility Mathematics for Utility Function Interactive Visualization App
        // Contains all mathematical functions for utility theory analysis
        
        const UtilityMath = {
        
          // Utility function definitions with pure mathematical operations
          utilityFunctions: {
            'cobb-douglas': {
              // Utility function: U(x,y) = Ax^α y^β
              utility: (x, y, config) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const safeX = Math.max(0.001, x);
                const safeY = Math.max(0.001, y);
                return cd_A * Math.pow(safeX, cd_alpha) * Math.pow(safeY, cd_beta);
              },
        
              // Marginal utility of X: MUx = ∂U/∂x = αAx^(α-1)y^β
              marginalX: (x, y, config) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const safeX = Math.max(0.001, x);
                const safeY = Math.max(0.001, y);
                return cd_A * cd_alpha * Math.pow(safeX, cd_alpha - 1) * Math.pow(safeY, cd_beta);
              },
        
              // Marginal utility of Y: MUy = ∂U/∂y = βAx^α y^(β-1)
              marginalY: (x, y, config) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const safeX = Math.max(0.001, x);
                const safeY = Math.max(0.001, y);
                return cd_A * cd_beta * Math.pow(safeX, cd_alpha) * Math.pow(safeY, cd_beta - 1);
              },
        
              // Marginal rate of substitution: MRS = MUx/MUy = (α/β)(y/x)
              mrs: (x, y, config) => {
                const { cd_alpha, cd_beta } = config;
                const safeX = Math.max(0.001, x);
                return (cd_alpha / cd_beta) * (y / safeX);
              },
        
              // Generate indifference curve points
              generateIndifferenceCurve: (targetUtility, maxX, maxY, config, numPoints = 100) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const points = [];
        
                for (let i = 0; i <= numPoints; i++) {
                  const x = (i / numPoints) * maxX;
                  if (x <= 0.001) continue;
        
                  try {
                    const y = Math.pow(targetUtility / (cd_A * Math.pow(x, cd_alpha)), 1 / cd_beta);
                    if (y > 0 && isFinite(y)) {
                      points.push({ x, y });
                    }
                  } catch (e) {
                    // Skip invalid points
                  }
                }
        
                return {
                  points: points,
                  curveType: 'smooth',
                  metadata: {
                    utilityLevel: targetUtility,
                    description: `Cobb-Douglas IC: U=${targetUtility.toFixed(2)}`
                  }
                };
              }
            },
        
            'perfect-substitutes': {
              // Utility function: U(x,y) = ax + by
              utility: (x, y, config) => {
                const { ps_a, ps_b } = config;
                return ps_a * Math.max(0, x) + ps_b * Math.max(0, y);
              },
        
              // Marginal utility of X: MUx = a (constant)
              marginalX: (x, y, config) => {
                const { ps_a } = config;
                return ps_a;
              },
        
              // Marginal utility of Y: MUy = b (constant)
              marginalY: (x, y, config) => {
                const { ps_b } = config;
                return ps_b;
              },
        
              // MRS = a/b (constant)
              mrs: (x, y, config) => {
                const { ps_a, ps_b } = config;
                return ps_a / ps_b;
              },
        
              // Generate indifference curve (linear)
              generateIndifferenceCurve: (targetUtility, maxX, maxY, config, numPoints = 100) => {
                const { ps_a, ps_b } = config;
                const points = [];
        
                // Linear IC: ax + by = U → y = (U - ax)/b
                const yIntercept = targetUtility / ps_b;
                const xIntercept = targetUtility / ps_a;
        
                if (yIntercept > 0) {
                  points.push({ x: 0, y: yIntercept });
                }
        
                // Add intermediate points
                for (let i = 1; i < numPoints; i++) {
                  const x = (i / numPoints) * xIntercept;
                  const y = (targetUtility - ps_a * x) / ps_b;
                  if (y >= 0) {
                    points.push({ x, y });
                  }
                }
        
                if (xIntercept > 0) {
                  points.push({ x: xIntercept, y: 0 });
                }
        
                return {
                  points: points,
                  curveType: 'linear',
                  metadata: {
                    utilityLevel: targetUtility,
                    description: `Perfect Substitutes IC: U=${targetUtility.toFixed(2)}`
                  }
                };
              }
            },
        
            'perfect-complements': {
              // Utility function: U(x,y) = A·min(ax, by)
              utility: (x, y, config) => {
                const { pc_A, pc_a, pc_b } = config;
                const safeX = Math.max(0, x);
                const safeY = Math.max(0, y);
                return pc_A * Math.min(pc_a * safeX, pc_b * safeY);
              },
        
              // Marginal utility of X: A*a if ax < by, 0 otherwise
              marginalX: (x, y, config) => {
                const { pc_A, pc_a, pc_b } = config;
                return (pc_a * x < pc_b * y) ? pc_A * pc_a : 0;
              },
        
              // Marginal utility of Y: A*b if by < ax, 0 otherwise
              marginalY: (x, y, config) => {
                const { pc_A, pc_a, pc_b } = config;
                return (pc_b * y < pc_a * x) ? pc_A * pc_b : 0;
              },
        
              // MRS: 0 on horizontal, ∞ on vertical, undefined at kink
              mrs: (x, y, config) => {
                const { pc_a, pc_b } = config;
                const ax = pc_a * x;
                const by = pc_b * y;
        
                if (Math.abs(ax - by) < 0.01) return NaN; // At the kink
                return (ax < by) ? 0 : Infinity;
              },
        
              // Generate L-shaped indifference curve
              generateIndifferenceCurve: (targetUtility, maxX, maxY, config, numPoints = 100) => {
                const { pc_A, pc_a, pc_b } = config;
        
                if (targetUtility <= 0 || pc_A <= 0) {
                  return {
                    points: [],
                    curveType: 'L-shaped',
                    metadata: {
                      utilityLevel: targetUtility,
                      description: `Perfect Complements IC: U=${targetUtility.toFixed(2)}`,
                      cornerX: 0,
                      cornerY: 0,
                      maxX: maxX,
                      maxY: maxY
                    }
                  };
                }
        
                // Corner point where ax = by
                const cornerX = targetUtility / (pc_A * pc_a);
                const cornerY = targetUtility / (pc_A * pc_b);
        
                return {
                  points: [], // L-shapes handled by drawLShape method
                  curveType: 'L-shaped',
                  metadata: {
                    utilityLevel: targetUtility,
                    description: `Perfect Complements IC: U=${targetUtility.toFixed(2)}`,
                    cornerX: Math.max(0.001, cornerX),
                    cornerY: Math.max(0.001, cornerY),
                    maxX: maxX,
                    maxY: maxY
                  }
                };
              }
            },
        
            'ces': {
              // CES Utility: U(x,y) = (ax^ρ + by^ρ)^(1/ρ) where b = 1-a
              utility: (x, y, config) => {
                const { ces_a, ces_rho } = config;
                const ces_b = 1 - ces_a;
                const safeX = Math.max(0.001, x);
                const safeY = Math.max(0.001, y);
                const EPS = 1e-6;
        
                if (Math.abs(ces_rho) < EPS) {
                  // ρ → 0: Cobb-Douglas
                  const total = ces_a + ces_b;
                  return Math.pow(safeX, ces_a / total) * Math.pow(safeY, ces_b / total);
                }
                if (Math.abs(ces_rho - 1) < EPS) {
                  // Perfect substitutes
                  return ces_a * safeX + ces_b * safeY;
                }
        
                const S = ces_a * Math.pow(safeX, ces_rho) + ces_b * Math.pow(safeY, ces_rho);
                return Math.pow(S, 1 / ces_rho);
              },
        
              // Marginal utility of X for CES
              marginalX: (x, y, config) => {
                const { ces_a, ces_rho } = config;
                const ces_b = 1 - ces_a;
                const safeX = Math.max(0.001, x);
                const safeY = Math.max(0.001, y);
                const EPS = 1e-6;
        
                if (Math.abs(ces_rho) < EPS) {
                  // Cobb-Douglas case
                  const total = ces_a + ces_b;
                  const alpha = ces_a / total;
                  const beta = ces_b / total;
                  return alpha * Math.pow(safeX, alpha - 1) * Math.pow(safeY, beta);
                }
                if (Math.abs(ces_rho - 1) < EPS) {
                  return ces_a;
                }
        
                const S = ces_a * Math.pow(safeX, ces_rho) + ces_b * Math.pow(safeY, ces_rho);
                return ces_a * Math.pow(safeX, ces_rho - 1) * Math.pow(S, (1 / ces_rho) - 1);
              },
        
              // Marginal utility of Y for CES
              marginalY: (x, y, config) => {
                const { ces_a, ces_rho } = config;
                const ces_b = 1 - ces_a;
                const safeX = Math.max(0.001, x);
                const safeY = Math.max(0.001, y);
                const EPS = 1e-6;
        
                if (Math.abs(ces_rho) < EPS) {
                  // Cobb-Douglas case
                  const total = ces_a + ces_b;
                  const alpha = ces_a / total;
                  const beta = ces_b / total;
                  return beta * Math.pow(safeX, alpha) * Math.pow(safeY, beta - 1);
                }
                if (Math.abs(ces_rho - 1) < EPS) {
                  return ces_b;
                }
        
                const S = ces_a * Math.pow(safeX, ces_rho) + ces_b * Math.pow(safeY, ces_rho);
                return ces_b * Math.pow(safeY, ces_rho - 1) * Math.pow(S, (1 / ces_rho) - 1);
              },
        
              // MRS for CES: (a/b)(y/x)^(1-ρ)
              mrs: (x, y, config) => {
                const { ces_a, ces_rho } = config;
                const ces_b = 1 - ces_a;
                const safeX = Math.max(0.001, x);
                const EPS = 1e-6;
        
                if (Math.abs(ces_rho) < EPS) {
                  // Cobb-Douglas: MRS = (a/b)(y/x)
                  return (ces_a / ces_b) * (y / safeX);
                }
                if (Math.abs(ces_rho - 1) < EPS) {
                  return ces_a / ces_b;
                }
        
                return (ces_a / ces_b) * Math.pow(y / safeX, 1 - ces_rho);
              },
        
              // Generate indifference curve for CES
              generateIndifferenceCurve: (U, maxX, maxY, config, numPoints = 100) => {
                const { ces_a, ces_rho } = config;
                const ces_b = 1 - ces_a;
                const EPS = 1e-6;
                const pts = [];
        
                if (Math.abs(ces_rho) < EPS) {
                  // Cobb-Douglas case
                  const total = ces_a + ces_b;
                  const alpha = ces_a / total;
                  const beta = ces_b / total;
                  for (let i = 0; i <= numPoints; i++) {
                    const x = (i / numPoints) * maxX;
                    if (x <= 0.001) continue;
                    const y = Math.pow(U / Math.pow(x, alpha), 1 / beta);
                    if (y > 0 && isFinite(y)) pts.push({ x, y });
                  }
                } else if (Math.abs(ces_rho - 1) < EPS) {
                  // Perfect substitutes
                  const yInt = U / ces_b;
                  const xInt = U / ces_a;
                  if (yInt > 0) pts.push({ x: 0, y: yInt });
                  if (xInt > 0) pts.push({ x: xInt, y: 0 });
                } else {
                  // General CES
                  const yLimit = maxY;
                  const term = (Math.pow(U, ces_rho) - ces_b * Math.pow(yLimit, ces_rho)) / ces_a;
                  const xMin = Math.max(0.001, term > 0 ? Math.pow(term, 1 / ces_rho) : 0.001);
        
                  for (let i = 0; i <= numPoints; i++) {
                    const t = i / numPoints;
                    const x = xMin + (maxX - xMin) * (Math.exp(t * Math.log(10)) - 1) / 9;
                    if (x <= 0.001) continue;
        
                    const termCalc = (Math.pow(U, ces_rho) - ces_a * Math.pow(x, ces_rho)) / ces_b;
                    if (termCalc > 0) {
                      const y = Math.pow(termCalc, 1 / ces_rho);
                      if (y > 0 && isFinite(y)) pts.push({ x, y });
                    }
                  }
                }
        
                return {
                  points: pts,
                  curveType: 'smooth',
                  metadata: {
                    utilityLevel: U,
                    description: `CES IC: U=${U.toFixed(2)}, ρ=${ces_rho.toFixed(1)}`
                  }
                };
              }
            },
        
            'quasilinear': {
              // Utility function: U(x,y) = x^α + by
              utility: (x, y, config) => {
                const { ql_alpha, ql_b } = config;
                const safeX = Math.max(0.001, x);
                const safeY = Math.max(0, y);

          // Create 3D text sprite for axis labels
          create3DTextSprite: (text, color = 0x000000) => {
            // Create a canvas for the text
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
        
            // High-DPI support for crisp text
            const devicePixelRatio = window.devicePixelRatio || 1;
            const size = 128;
        
            // Set canvas size with high-DPI scaling
            canvas.width = size * devicePixelRatio;
            canvas.height = size * devicePixelRatio;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
        
            // Scale context for high-DPI
            context.scale(devicePixelRatio, devicePixelRatio);
        
            // Set font and fill text - larger font for better readability
            context.font = 'Bold 32px Arial';
            context.fillStyle = `#${color.toString(16).padStart(6, '0')}`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
        
            // Improve text rendering quality
            context.imageSmoothingEnabled = true;
            context.imageSmoothingQuality = 'high';
        
            context.fillText(text, size / 2, size / 2);
        
            // Create texture from canvas
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
        
            // Create material with texture
            const material = new THREE.SpriteMaterial({
              map: texture,
              transparent: true,
              alphaTest: 0.1
            });
        
            // Create and return sprite
            const sprite = new THREE.Sprite(material);
            return sprite;
          },
        
          // Render 3D scene
          render3DScene: (renderer, scene, camera) => {
            renderer.render(scene, camera);
          },
        
          // Animation loop for 3D scene
          animate3D: (renderFunction) => {
            const animate = () => {
              requestAnimationFrame(animate);
              renderFunction();
            };
            animate();
          },
        
        
        };
        
        // Make available globally for both module and script usage
        if (typeof module !== 'undefined' && module.exports) {
          module.exports = CanvasUtils;
        } else {
          window.CanvasUtils = CanvasUtils;
        }
    </script>

<body>
    <div id="root"></div>

    <!-- Load configuration and math modules -->
    <script type="text/javascript">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // Utility-specific wrapper functions for generic slicing plane utilities
        const UtilitySlicingPlane = {
            create: (scene, analysisMode, params, bounds) => {
                // Remove existing utility slicing planes
                CanvasUtils.remove3DSlicingPlanes(scene, 'utilitySlicing');

                // Get analysis mode configuration
                const modeConfig = UtilConfig.analysisModes[analysisMode];
                const planeType = modeConfig.slicingPlane;
                const planeConfig = UtilConfig.slicingPlanes[planeType];

                // Make planes 20% larger while keeping centers linked to original bounds
                const planeSize = {
                    width: bounds.maxY * 1.2,
                    height: bounds.maxU * 1.2,
                    depth: bounds.maxX * 1.2
                };

                let center, orientation;

                switch (planeType) {
                    case 'horizontal':
                        // Horizontal plane for IC map analysis (constant utility)
                        const utilityLevel = params.utilityLevel || 5;
                        center = { x: bounds.maxY / 2, y: utilityLevel, z: bounds.maxX / 2 };
                        orientation = 'horizontal';
                        break;
                    case 'vertical-Y':
                        // Vertical plane for U vs X analysis (constant Y)
                        const fixedY = params.goodYLevel || 3;
                        center = { x: fixedY, y: bounds.maxU / 2, z: bounds.maxX / 2 };
                        orientation = 'vertical-x';
                        break;
                    case 'vertical-X':
                        // Vertical plane for U vs Y analysis (constant X)
                        const fixedX = params.goodXLevel || 3;
                        center = { x: bounds.maxY / 2, y: bounds.maxU / 2, z: fixedX };
                        orientation = 'vertical-z';
                        break;
                }

                // Create the slicing plane using generic utilities
                return CanvasUtils.add3DSlicingPlane(
                    scene,
                    center,
                    orientation,
                    planeConfig.color,
                    planeConfig.opacity,
                    planeSize,
                    'utilitySlicing_' + planeType
                );
            },

            update: (scene, analysisMode, params, bounds) => {
                // Get analysis mode configuration
                const modeConfig = UtilConfig.analysisModes[analysisMode];
                const planeType = modeConfig.slicingPlane;
                const planeName = 'utilitySlicing_' + planeType;

                // Find the plane in the scene
                const plane = scene.children.find(child => child.name === planeName);
                if (!plane) return;

                // Calculate new center position based on current parameters
                let newCenter;

                switch (planeType) {
                    case 'horizontal':
                        const utilityLevel = params.utilityLevel || 5;
                        newCenter = { x: plane.position.x, y: utilityLevel, z: plane.position.z };
                        break;
                    case 'vertical-Y':
                        const fixedY = params.goodYLevel || 3;
                        newCenter = { x: fixedY, y: plane.position.y, z: plane.position.z };
                        break;
                    case 'vertical-X':
                        const fixedX = params.goodXLevel || 3;
                        newCenter = { x: plane.position.x, y: plane.position.y, z: fixedX };
                        break;
                }

                // Update the plane position using generic utilities
                CanvasUtils.update3DSlicingPlane(plane, newCenter);
            }
        };

        // Main Utility Function Visualization Component
        const UtilityVisualization = () => {
            // State for selected utility function
            const [selectedUtilityFunction, setSelectedUtilityFunction] = useState('cobb-douglas');

            // State for analysis mode (indifference-map, x-section, y-section)
            const [selectedAnalysisMode, setSelectedAnalysisMode] = useState('indifference-map');

            // State for all parameters - initialized with defaults
            const [params, setParams] = useState(() => {
                const allDefaults = {};

                // Add analysis parameter defaults
                Object.keys(UtilConfig.analysisParams).forEach(key => {
                    const param = UtilConfig.analysisParams[key];
                    allDefaults[key] = param.default;
                });

                // Add utility function parameter defaults
                Object.keys(UtilConfig.utilityFunctions).forEach(funcKey => {
                    const funcConfig = UtilConfig.utilityFunctions[funcKey];
                    Object.keys(funcConfig.config.params).forEach(paramKey => {
                        const param = funcConfig.config.params[paramKey];
                        allDefaults[paramKey] = param.default;
                    });
                });

                return allDefaults;
            });

            // State for slicing plane visibility (default: show)
            const [planesVisible, setPlanesVisible] = useState(true);

            // Canvas refs
            const scene3DRef = useRef();
            const topAnalysisRef = useRef();

            // 3D scene management
            const [scene3D, setScene3D] = useState(null);
            const [camera3D, setCamera3D] = useState(null);
            const [renderer3D, setRenderer3D] = useState(null);
            const [controls3D, setControls3D] = useState(null);

            // Helper functions for parameter management
            const updateParam = useCallback((key, value) => {
                setParams(prev => ({ ...prev, [key]: value }));
            }, []);

            const resetAnalysisParams = useCallback(() => {
                const analysisDefaults = {};
                Object.keys(UtilConfig.analysisParams).forEach(key => {
                    const param = UtilConfig.analysisParams[key];
                    analysisDefaults[key] = param.default;
                });
                setParams(prev => ({ ...prev, ...analysisDefaults }));
            }, []);

            const resetUtilityParams = useCallback(() => {
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                const functionDefaults = {};
                Object.keys(funcConfig.config.params).forEach(key => {
                    const param = funcConfig.config.params[key];
                    functionDefaults[key] = param.default;
                });
                setParams(prev => ({ ...prev, ...functionDefaults }));
            }, [selectedUtilityFunction]);

            // Calculate utility analysis
            const utilityAnalysis = useMemo(() => {
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                const utilityFn = UtilityMath.utilityFunctions[selectedUtilityFunction];

                // Current good levels for analysis
                const x = params.goodXLevel || 3;
                const y = params.goodYLevel || 3;

                // Calculate utility values
                const utility = utilityFn.utility(x, y, params);
                const marginalX = utilityFn.marginalX(x, y, params);
                const marginalY = utilityFn.marginalY(x, y, params);
                const mrs = utilityFn.mrs(x, y, params);

                return {
                    currentInputs: { x, y },
                    currentUtility: utility,
                    marginalUtilities: { x: marginalX, y: marginalY },
                    mrs: mrs
                };
            }, [selectedUtilityFunction, params]);

            // Generic function to render parameter controls
            const renderParameterControls = useCallback((parameterConfig) => {
                return Object.keys(parameterConfig).map(key => {
                    const param = parameterConfig[key];
                    return React.createElement('div', {
                        key: key,
                        className: "space-y-1"
                    }, [
                        React.createElement('label', {
                            key: 'label',
                            className: "block text-sm font-medium text-gray-600"
                        }, param.label),
                        React.createElement('div', {
                            key: 'slider-container',
                            className: "flex items-center space-x-3"
                        }, [
                            React.createElement('input', {
                                key: 'slider',
                                type: 'range',
                                min: param.min,
                                max: param.max,
                                step: param.step,
                                value: params[key] ?? param.default,
                                onChange: (e) => updateParam(key, Number(e.target.value)),
                                className: "flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider"
                            }),
                            React.createElement('span', {
                                key: 'value',
                                className: "text-sm font-mono text-gray-600 w-12 text-right"
                            }, (params[key] ?? param.default).toFixed(param.precision))
                        ])
                    ]);
                });
            }, [params, updateParam]);

            // Helper functions using the generic renderParameterControls
            const renderAnalysisParameterControls = useCallback(() => {
                return renderParameterControls(UtilConfig.analysisParams);
            }, [renderParameterControls]);

            const renderUtilityParameterControls = useCallback(() => {
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                return renderParameterControls(funcConfig.config.params);
            }, [renderParameterControls, selectedUtilityFunction]);

            // MathJax rendering effect
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax typeset failed:', err));
                }
            }, [selectedUtilityFunction]);

            // Helper function to render utility function equation display
            const renderEquationDisplay = () => {
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                if (!funcConfig) return '';

                let generalFormLatex = funcConfig.mathForm;
                let currentValuesLatex = '';

                // Add specific form with actual parameter values
                switch(selectedUtilityFunction) {
                    case 'cobb-douglas':
                        const A = (params.cd_A ?? 1).toFixed(2);
                        const alpha = (params.cd_alpha ?? 0.5).toFixed(2);
                        const beta = (params.cd_beta ?? 0.5).toFixed(2);
                        currentValuesLatex = `U = ${A}x<sup>${alpha}</sup>y<sup>${beta}</sup>`;
                        break;
                    case 'perfect-substitutes':
                        const ps_a = (params.ps_a ?? 1.5).toFixed(2);
                        const ps_b = (params.ps_b ?? 1.0).toFixed(2);
                        currentValuesLatex = `U = ${ps_a}x + ${ps_b}y`;
                        break;
                    case 'perfect-complements':
                        const pc_A = (params.pc_A ?? 1).toFixed(2);
                        const pc_a = (params.pc_a ?? 1).toFixed(2);
                        const pc_b = (params.pc_b ?? 1).toFixed(2);
                        currentValuesLatex = `U = ${pc_A} min(${pc_a}x, ${pc_b}y)`;
                        break;
                    case 'ces':
                        const ces_a = (params.ces_a ?? 0.5).toFixed(2);
                        const ces_rho = (params.ces_rho ?? -0.5).toFixed(2);
                        const ces_b = (1 - (params.ces_a ?? 0.5)).toFixed(2);
                        const invRho = (1 / (params.ces_rho ?? -0.5)).toFixed(2);
                        currentValuesLatex = `U = (${ces_a}x<sup>${ces_rho}</sup> + ${ces_b}y<sup>${ces_rho}</sup>)<sup>${invRho}</sup>`;
                        break;
                    case 'quasilinear':
                        const ql_alpha = (params.ql_alpha ?? 0.5).toFixed(2);
                        const ql_b = (params.ql_b ?? 1).toFixed(2);
                        currentValuesLatex = `U = x<sup>${ql_alpha}</sup> + ${ql_b}y`;
                        break;
                }

                const generalLatex = `$${generalFormLatex}$`;
                const specificLatex = currentValuesLatex;

                return React.createElement('div', {
                    key: 'math-equation',
                    className: "text-center"
                }, [
                    React.createElement('div', {
                        key: 'general-form',
                        className: "mb-1"
                    }, generalLatex),
                    React.createElement('div', {
                        key: 'specific-form',
                        className: "text-sm text-blue-600",
                        dangerouslySetInnerHTML: { __html: specificLatex }
                    })
                ]);
            };

            // Initialize 3D scene
            useEffect(() => {
                if (!scene3DRef.current) return;

                const container = scene3DRef.current;
                const { scene, camera, renderer } = CanvasUtils.init3DCanvas(container, UtilConfig.layout.canvas3D.width, UtilConfig.layout.canvas3D.height);

                // Set up lighting
                CanvasUtils.setup3DLighting(scene, UtilConfig.scene3D.lighting);

                // Add axes
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                const bounds = funcConfig.config.surface3D;
                CanvasUtils.add3DAxes(scene, {
                    maxX: bounds.maxY,    // Good Y on X-axis
                    maxY: bounds.maxU,    // Utility on Y-axis (scaled to fit view)
                    maxZ: bounds.maxX,    // Good X on Z-axis
                    xLabel: 'Good Y',
                    yLabel: 'Utility',
                    zLabel: 'Good X',
                    labelScale: 3.5,      // Scaled for smaller surface
                    labelOffsets: {
                        x: { x: 0, y: 0, z: -2 },
                        y: { x: 0, y: 1, z: 0 },
                        z: { x: -2, y: 0, z: 0 }
                    }
                });

                // Set up camera controls
                const controls = CanvasUtils.setup3DOrbitControls(camera, renderer, UtilConfig.scene3D.camera.target, UtilConfig.scene3D.controls);
                camera.position.set(
                    UtilConfig.scene3D.camera.position.x,
                    UtilConfig.scene3D.camera.position.y,
                    UtilConfig.scene3D.camera.position.z
                );
                controls.update();

                // Start animation loop
                const animate = () => {
                    requestAnimationFrame(animate);
                    controls.update();
                    CanvasUtils.render3DScene(renderer, scene, camera);
                };
                animate();

                setScene3D(scene);
                setCamera3D(camera);
                setRenderer3D(renderer);
                setControls3D(controls);

                // Cleanup function
                return () => {
                    CanvasUtils.dispose3DCanvas(renderer);
                };
            }, []);

            // Update 3D utility surface when function or parameters change
            useEffect(() => {
                if (!scene3D || !renderer3D) return;

                // Remove existing utility surfaces (both main and wireframe)
                const surfacesToRemove = scene3D.children.filter(child =>
                    child.name === 'utilitySurface' || child.name === 'utilitySurfaceWireframe'
                );
                surfacesToRemove.forEach(surface => {
                    scene3D.remove(surface);
                    surface.geometry?.dispose();
                    surface.material?.dispose();
                });

                // Create new utility surface
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                const bounds = funcConfig.config.surface3D;

                const geometry = UtilityMath.create3DUtilitySurface(
                    selectedUtilityFunction,
                    params,
                    bounds,
                    bounds.resolution
                );

                const material = new THREE.MeshLambertMaterial({
                    color: bounds.meshColor,
                    wireframe: false,
                    transparent: true,
                    opacity: 0.2,
                    side: THREE.DoubleSide
                });

                const surface = new THREE.Mesh(geometry, material);
                surface.name = 'utilitySurface';
                surface.renderOrder = 1; // Render before slicing planes
                scene3D.add(surface);

                // Add wireframe version
                const wireframeMaterial = new THREE.MeshBasicMaterial({
                    color: bounds.wireframeColor,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.9
                });

                const wireframeSurface = new THREE.Mesh(geometry.clone(), wireframeMaterial);
                wireframeSurface.name = 'utilitySurfaceWireframe';
                wireframeSurface.renderOrder = 0; // Render first (wireframe behind everything)
                scene3D.add(wireframeSurface);

            }, [scene3D, renderer3D, selectedUtilityFunction, params]);

            // Create and update slicing planes based on analysis mode
            useEffect(() => {
                if (!scene3D) return;

                // Get surface bounds for current utility function
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                const bounds = funcConfig.config.surface3D;

                // Create slicing plane only if planes are visible
                if (planesVisible) {
                    UtilitySlicingPlane.create(scene3D, selectedAnalysisMode, params, bounds);
                } else {
                    // Remove any existing slicing planes when hidden
                    CanvasUtils.remove3DSlicingPlanes(scene3D, 'utilitySlicing');
                }

            }, [scene3D, selectedAnalysisMode, selectedUtilityFunction, planesVisible]);

            // Update slicing plane positions when parameters change
            useEffect(() => {
                if (!scene3D || !planesVisible) return;

                // Get surface bounds for current utility function
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                const bounds = funcConfig.config.surface3D;

                // Update slicing plane position using wrapper function
                UtilitySlicingPlane.update(scene3D, selectedAnalysisMode, params, bounds);

            }, [scene3D, selectedAnalysisMode, params, selectedUtilityFunction, planesVisible]);

            // Draw top analysis visualization
            useEffect(() => {
                if (!topAnalysisRef.current || !utilityAnalysis) return;

                const canvas = topAnalysisRef.current;
                const canvasConfig = UtilConfig.layout.analysisCanvas.topCanvas;
                const { ctx, width, height } = CanvasUtils.initCanvas(canvas, canvasConfig.width, canvasConfig.height);
                const margins = CanvasUtils.calculateMargins(width, height);

                // Render based on analysis mode
                switch (selectedAnalysisMode) {
                    case 'indifference-map':
                        renderIndifferenceCurveMap(ctx, width, height, margins);
                        break;
                    case 'x-section':
                        renderUtilityVsXSection(ctx, width, height, margins);
                        break;
                    case 'y-section':
                        renderUtilityVsYSection(ctx, width, height, margins);
                        break;
                }

            }, [selectedUtilityFunction, selectedAnalysisMode, params, utilityAnalysis]);


            // Rendering functions for 2D views
            const renderIndifferenceCurveMap = useCallback((ctx, width, height, margins) => {
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                const visualConfig = funcConfig.config.icView;
                const transform = CanvasUtils.createTransform(margins, width, height, visualConfig.maxX, visualConfig.maxY);

                // Draw coordinate system
                const gridConfig = {
                    xPoints: visualConfig.gridPoints.x,
                    yPoints: visualConfig.gridPoints.y
                };

                CanvasUtils.drawGrid(ctx, margins, width, height, transform, gridConfig);
                CanvasUtils.drawAxes(ctx, margins, width, height, 'Good X', 'Good Y');
                CanvasUtils.drawTicks(ctx, margins, width, height, transform, gridConfig);

                CanvasUtils.setupClipping(ctx, margins, width, height);

                // Draw background indifference curves
                const utilityFn = UtilityMath.utilityFunctions[selectedUtilityFunction];
                visualConfig.backgroundLevels.forEach(level => {
                    const ic = utilityFn.generateIndifferenceCurve(level, visualConfig.maxX, visualConfig.maxY, params);

                    if (ic.curveType === 'L-shaped' && ic.metadata) {
                        CanvasUtils.drawLShape(ctx, ic.metadata.cornerX, ic.metadata.cornerY, visualConfig.maxX, visualConfig.maxY, transform, {
                            color: '#d1d5db',
                            lineWidth: 1
                        });
                    } else if (ic.points && ic.points.length > 0) {
                        CanvasUtils.drawCurve(ctx, ic.points, transform, {
                            color: '#d1d5db',
                            lineWidth: 1
                        });
                    }
                });

                // Draw highlighted indifference curve at current utility level
                const targetUtility = params.utilityLevel || 5;
                const highlightedIC = utilityFn.generateIndifferenceCurve(targetUtility, visualConfig.maxX, visualConfig.maxY, params);

                if (highlightedIC.curveType === 'L-shaped' && highlightedIC.metadata) {
                    CanvasUtils.drawLShape(ctx, highlightedIC.metadata.cornerX, highlightedIC.metadata.cornerY, visualConfig.maxX, visualConfig.maxY, transform, {
                        color: '#1e40af',
                        lineWidth: 3
                    });
                } else if (highlightedIC.points && highlightedIC.points.length > 0) {
                    CanvasUtils.drawCurve(ctx, highlightedIC.points, transform, {
                        color: '#1e40af',
                        lineWidth: 3
                    });
                }

                // Highlight current point
                const currentX = params.goodXLevel || 3;
                const currentY = params.goodYLevel || 3;
                CanvasUtils.highlightPoint(ctx, currentX, currentY, transform, {
                    outerColor: '#dc2626',
                    innerColor: '#ffffff'
                });

                CanvasUtils.restoreClipping(ctx);
            }, [selectedUtilityFunction, params]);


            const renderUtilityVsXSection = useCallback((ctx, width, height, margins) => {
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                const visualConfig = funcConfig.config.crossSectionView;
                const fixedY = params.goodYLevel || 3;

                // Generate cross-section curve
                const crossSection = UtilityMath.generateCrossSection(
                    selectedUtilityFunction, params, 'Y', fixedY, visualConfig.maxInput
                );

                if (crossSection && crossSection.length > 0) {
                    const transform = CanvasUtils.createTransform(margins, width, height, visualConfig.maxInput, visualConfig.maxUtility);

                    // Draw coordinate system
                    const gridConfig = {
                        xPoints: visualConfig.gridPoints.x,
                        yPoints: visualConfig.gridPoints.y
                    };

                    CanvasUtils.drawGrid(ctx, margins, width, height, transform, gridConfig);
                    CanvasUtils.drawAxes(ctx, margins, width, height, 'Good X', 'Utility (U)');
                    CanvasUtils.drawTicks(ctx, margins, width, height, transform, gridConfig);

                    CanvasUtils.setupClipping(ctx, margins, width, height);

                    // Draw curve
                    const curvePoints = crossSection.map(point => ({ x: point.input, y: point.utility }));
                    CanvasUtils.drawCurve(ctx, curvePoints, transform, {
                        color: '#059669',
                        lineWidth: 3
                    });

                    // Highlight current point
                    const currentX = params.goodXLevel || 3;
                    const currentUtility = utilityAnalysis.currentUtility;
                    CanvasUtils.highlightPoint(ctx, currentX, currentUtility, transform, {
                        outerColor: '#dc2626',
                        innerColor: '#ffffff'
                    });

                    CanvasUtils.restoreClipping(ctx);
                }
            }, [selectedUtilityFunction, params, utilityAnalysis]);


            const renderUtilityVsYSection = useCallback((ctx, width, height, margins) => {
                const funcConfig = UtilConfig.utilityFunctions[selectedUtilityFunction];
                const visualConfig = funcConfig.config.crossSectionView;
                const fixedX = params.goodXLevel || 3;

                // Generate cross-section curve
                const crossSection = UtilityMath.generateCrossSection(
                    selectedUtilityFunction, params, 'X', fixedX, visualConfig.maxInput
                );

                if (crossSection && crossSection.length > 0) {
                    const transform = CanvasUtils.createTransform(margins, width, height, visualConfig.maxInput, visualConfig.maxUtility);

                    // Draw coordinate system
                    const gridConfig = {
                        xPoints: visualConfig.gridPoints.x,
                        yPoints: visualConfig.gridPoints.y
                    };

                    CanvasUtils.drawGrid(ctx, margins, width, height, transform, gridConfig);
                    CanvasUtils.drawAxes(ctx, margins, width, height, 'Good Y', 'Utility (U)');
                    CanvasUtils.drawTicks(ctx, margins, width, height, transform, gridConfig);

                    CanvasUtils.setupClipping(ctx, margins, width, height);

                    // Draw curve
                    const curvePoints = crossSection.map(point => ({ x: point.input, y: point.utility }));
                    CanvasUtils.drawCurve(ctx, curvePoints, transform, {
                        color: '#dc2626',
                        lineWidth: 3
                    });

                    // Highlight current point
                    const currentY = params.goodYLevel || 3;
                    const currentUtility = utilityAnalysis.currentUtility;
                    CanvasUtils.highlightPoint(ctx, currentY, currentUtility, transform, {
                        outerColor: '#dc2626',
                        innerColor: '#ffffff'
                    });

                    CanvasUtils.restoreClipping(ctx);
                }
            }, [selectedUtilityFunction, params, utilityAnalysis]);


            return React.createElement('div', {
                className: "min-h-screen p-6"
            }, [
                // Header
                React.createElement('div', {
                    key: 'header',
                    className: "text-center mb-4"
                }, [
                    React.createElement('h1', {
                        key: 'title',
                        className: "text-3xl font-bold text-gray-800 mb-2"
                    }, 'Utility Function Visualization')
                ]),

                // Main content grid
                React.createElement('div', {
                    key: 'content',
                    className: "grid grid-cols-1 lg:grid-cols-3 gap-3 max-w-7xl mx-auto"
                }, [
                    // Left column: Parameter controls
                    React.createElement('div', {
                        key: 'controls',
                        className: "space-y-3"
                    }, [
                        // Utility Function Selector
                        React.createElement('div', {
                            key: 'function-selector',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('h3', {
                                key: 'selector-title',
                                className: "text-lg font-semibold text-gray-700 mb-4"
                            }, 'Utility Function'),
                            React.createElement('select', {
                                key: 'function-dropdown',
                                value: selectedUtilityFunction,
                                onChange: (e) => setSelectedUtilityFunction(e.target.value),
                                className: "w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            },
                                Object.keys(UtilConfig.utilityFunctions).map(funcKey =>
                                    React.createElement('option', {
                                        key: funcKey + '-option',
                                        value: funcKey
                                    }, UtilConfig.utilityFunctions[funcKey].name)
                                )
                            )
                        ]),

                        // Analysis Parameters panel
                        React.createElement('div', {
                            key: 'analysis-parameters',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('div', {
                                key: 'analysis-param-header',
                                className: "flex justify-between items-center mb-4"
                            }, [
                                React.createElement('h3', {
                                    key: 'analysis-param-title',
                                    className: "text-lg font-semibold text-gray-700"
                                }, 'Utility/Good Levels'),
                                React.createElement('button', {
                                    key: 'reset-analysis-button',
                                    onClick: resetAnalysisParams,
                                    className: "text-sm px-2 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors"
                                }, 'Reset')
                            ]),
                            React.createElement('div', {
                                key: 'analysis-param-controls',
                                className: "space-y-3"
                            }, renderAnalysisParameterControls())
                        ]),

                        // Utility Function Parameters panel
                        React.createElement('div', {
                            key: 'utility-parameters',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('div', {
                                key: 'util-param-header',
                                className: "flex justify-between items-center mb-4"
                            }, [
                                React.createElement('h3', {
                                    key: 'util-param-title',
                                    className: "text-lg font-semibold text-gray-700"
                                }, 'Utility Function Parameters'),
                                React.createElement('button', {
                                    key: 'reset-util-button',
                                    onClick: resetUtilityParams,
                                    className: "text-sm px-2 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors"
                                }, 'Reset')
                            ]),
                            React.createElement('div', {
                                key: 'equation-display',
                                className: "text-center mb-4 p-2 bg-gray-50 rounded"
                            }, renderEquationDisplay()),
                            React.createElement('div', {
                                key: 'util-param-controls',
                                className: "space-y-3"
                            }, renderUtilityParameterControls())
                        ])
                    ]),

                    // Center column: 3D visualization
                    React.createElement('div', {
                        key: 'center-container',
                        className: "space-y-3"
                    }, [
                        // 3D utility surface visualization
                        React.createElement('div', {
                            key: '3d-viz',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('div', {
                                key: '3d-header',
                                className: "mb-4"
                            }, [
                                React.createElement('h3', {
                                    key: '3d-title',
                                    className: "text-lg font-semibold text-gray-700 mb-2"
                                }, 'Utility Function (3D View)'),

                                React.createElement('div', {
                                    key: '3d-controls',
                                    className: "flex gap-2"
                                }, [
                                    React.createElement('button', {
                                        key: 'toggle-plane-button',
                                        onClick: () => setPlanesVisible(!planesVisible),
                                        className: planesVisible
                                            ? "text-sm px-3 py-1 border border-blue-400 rounded text-white bg-blue-500 hover:bg-blue-600 transition-colors"
                                            : "text-sm px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors"
                                    }, planesVisible ? 'Hide 2D Slice Plane' : 'Show 2D Slice Plane'),
                                    React.createElement('button', {
                                        key: 'reset-3d-button',
                                        onClick: () => {
                                            if (camera3D && controls3D) {
                                                CanvasUtils.reset3DView(camera3D, controls3D, UtilConfig.scene3D.camera.position, UtilConfig.scene3D.camera.target);
                                            }
                                        },
                                        className: "text-sm px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors"
                                    }, 'Reset View')
                                ])
                            ]),

                            React.createElement('div', {
                                key: '3d-container',
                                ref: scene3DRef,
                                style: { width: UtilConfig.layout.canvas3D.width + 'px', height: UtilConfig.layout.canvas3D.height + 'px', margin: '0 auto' }
                            }),

                            // 3D controls instructions
                            React.createElement('div', {
                                key: '3d-controls-help',
                                className: "text-xs text-gray-500 text-center mt-2 italic"
                            }, 'Drag to rotate • Scroll to zoom • Right-drag to pan'),

                            // Explanatory note about utility function and slicing planes
                            React.createElement('div', {
                                key: 'utility-function-note',
                                className: "text-sm text-gray-600 mt-4 p-2 bg-blue-50 rounded border-l-4 border-blue-200 space-y-2"
                            }, [
                                React.createElement('p', {
                                    key: 'utility-explanation'
                                }, 'The 3D utility surface shows how utility varies with consumption of two goods. Higher points on the surface represent greater satisfaction.'),
                                React.createElement('p', {
                                    key: 'slicing-explanation'
                                }, 'The slicing plane reveals different relationships: horizontal slices show indifference curves (constant utility), while vertical slices show how utility changes with one good.')
                            ])
                        ])
                    ]),

                    // Right column: 2D analysis visualizations
                    React.createElement('div', {
                        key: 'analysis-viz',
                        className: "space-y-3"
                    }, [
                        // Analysis mode selector
                        React.createElement('div', {
                            key: 'analysis-mode-selector',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('h3', {
                                key: 'mode-title',
                                className: "text-lg font-semibold text-gray-700 mb-4"
                            }, '2D View Mode'),
                            React.createElement('div', {
                                key: 'analysis-mode-buttons',
                                className: "flex gap-2"
                            }, Object.keys(UtilConfig.analysisModes).map(modeKey =>
                                React.createElement('button', {
                                    key: `${modeKey}-button`,
                                    onClick: () => setSelectedAnalysisMode(modeKey),
                                    className: `analysis-button ${selectedAnalysisMode === modeKey ? 'active' : ''}`
                                }, UtilConfig.analysisModes[modeKey].buttonLabel)
                            )),

                            // Explanatory note about 2D view controls
                            React.createElement('div', {
                                key: '2d-controls-note',
                                className: "text-sm text-gray-600 mt-4 p-2 bg-blue-50 rounded border-l-4 border-blue-200"
                            }, 'Select a view mode. Use Utility/Good controls to adjust the highlighted level.')
                        ]),

                        // Top analysis visualization (independent panel)
                        React.createElement('div', {
                            key: 'top-analysis-viz',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('h3', {
                                key: 'top-title',
                                className: "text-lg font-semibold text-gray-700 mb-2"
                            }, UtilConfig.analysisModes[selectedAnalysisMode]?.topView?.name || 'Primary View'),

                            // Dynamic explanatory text based on analysis mode
                            React.createElement('div', {
                                key: 'explanation-text',
                                className: "text-sm text-gray-600 mb-4 p-2 bg-blue-50 rounded border-l-4 border-blue-200"
                            }, (() => {
                                let explanation = '';
                                switch(selectedAnalysisMode) {
                                    case 'indifference-map':
                                        const utilityLevel = params.utilityLevel || 5;
                                        explanation = `Bundles of goods that provide the same utility level. The highlighted curve corresponds to the utility level of ${utilityLevel.toFixed(1)}. The slope of the indifference curve is the Marginal Rate of Substitution (MRS).`;
                                        break;
                                    case 'x-section':
                                        const fixedY = params.goodYLevel || 3;
                                        explanation = `How utility changes as Good X increases, holding Good Y constant at ${fixedY.toFixed(1)} units. The slope is the marginal utility of X.`;
                                        break;
                                    case 'y-section':
                                        const fixedX = params.goodXLevel || 3;
                                        explanation = `How utility changes as Good Y increases, holding Good X constant at ${fixedX.toFixed(1)} units. The slope is the marginal utility of Y.`;
                                        break;
                                }
                                return explanation;
                            })()),

                            React.createElement('canvas', {
                                key: 'top-analysis-canvas',
                                ref: topAnalysisRef,
                                width: UtilConfig.layout.analysisCanvas.topCanvas.width,
                                height: UtilConfig.layout.analysisCanvas.topCanvas.height
                            })
                        ]),

                    ])
                ])
            ]);
        };

        // Initialize app after all scripts are loaded
        const initializeApp = () => {
            console.log('Checking for required modules...');
            console.log('UtilConfig:', !!window.UtilConfig);
            console.log('UtilityMath:', !!window.UtilityMath);
            console.log('CanvasUtils:', !!window.CanvasUtils);
            console.log('THREE:', !!window.THREE);

            if (window.UtilConfig && window.UtilityMath && window.CanvasUtils && window.THREE) {
                console.log('All modules loaded, initializing React app...');
                try {
                    const root = ReactDOM.createRoot(document.getElementById('root'));
                    root.render(React.createElement(UtilityVisualization));
                    console.log('React app rendered successfully!');
                } catch (error) {
                    console.error('Error rendering React app:', error);
                }
            } else {
                console.log('Waiting for modules to load...');
                setTimeout(initializeApp, 100);
            }
        };

        // Start initialization
        initializeApp();
    </script>
</body>
</html>
