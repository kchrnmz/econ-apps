    <script>
        // Embedded Module: productionMath.js
        // Production Mathematics for Production Function Interactive Visualization App
        // Contains all mathematical functions for production theory analysis
        
        const ProductionMath = {
        
          // Production function definitions with pure mathematical operations
          productionFunctions: {
            'cobb-douglas': {
              // Production function: q = AL^α K^β
              production: (L, K, config) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                return cd_A * Math.pow(safeL, cd_alpha) * Math.pow(safeK, cd_beta);
              },
        
              // Marginal product of labor: MPₗ = ∂q/∂L = αAL^(α-1)K^β
              marginalL: (L, K, config) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                return cd_A * cd_alpha * Math.pow(safeL, cd_alpha - 1) * Math.pow(safeK, cd_beta);
              },
        
              // Marginal product of capital: MPₖ = ∂q/∂K = βAL^α K^(β-1)
              marginalK: (L, K, config) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                return cd_A * cd_beta * Math.pow(safeL, cd_alpha) * Math.pow(safeK, cd_beta - 1);
              },
        
              // Marginal rate of technical substitution: MRTS = -MPₗ/MPₖ = -αK/(βL)
              mrts: (L, K, config) => {
                const { cd_alpha, cd_beta } = config;
                const safeL = Math.max(0.001, L);
                return -(cd_alpha * K) / (cd_beta * safeL);
              },
        
              // Generate isoquant curve for given output level with adaptive spacing
              generateIsoquant: (targetOutput, config, maxL = 30, maxK = 30, points = 100) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const curve = [];
        
                // Adaptive minimum L calculation: work backwards from maxK
                // From q = AL^α K^β, solve for L when K = maxK: L = (q/(A*maxK^β))^(1/α)
                const LMin = Math.max(0.001, Math.pow(targetOutput / (cd_A * Math.pow(maxK, cd_beta)), 1 / cd_alpha));
        
                for (let i = 0; i <= points; i++) {
                  const t = i / points; // t from 0 to 1
                  // Logarithmic spacing: more points near LMin where curve is steepest
                  const L = LMin + (maxL - LMin) * (Math.exp(t * Math.log(10)) - 1) / 9;
        
                  // From q = AL^α K^β, solve for K: K = (q/(AL^α))^(1/β)
                  const K = Math.pow(targetOutput / (cd_A * Math.pow(L, cd_alpha)), 1 / cd_beta);
        
                  // Remove bound checking - rely on canvas clipping instead
                  if (K > 0 && isFinite(K)) {
                    curve.push({ L, K });
                  }
                }
        
                return curve;
              }
            },
        
            'ces': {
              // CES Production function: q = (aL^ρ + (1-a)K^ρ)^(ν/ρ) where ρ = (σ-1)/σ
              production: (L, K, config) => {
                const { ces_a, ces_sigma, ces_nu } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                const nu = ces_nu ?? 1.0; // Default to 1 if not specified
        
                const rho = (ces_sigma - 1) / ces_sigma;
                const EPS = 1e-6;
        
                // Handle special case: ρ ≈ 0 (σ ≈ 1) → Cobb-Douglas with returns to scale
                if (Math.abs(rho) < EPS) {
                  // Use Cobb-Douglas formula with returns to scale: q = (L^a * K^(1-a))^ν
                  return Math.pow(Math.pow(safeL, ces_a) * Math.pow(safeK, 1 - ces_a), nu);
                }
        
                const term1 = ces_a * Math.pow(safeL, rho);
                const term2 = (1 - ces_a) * Math.pow(safeK, rho);
        
                return Math.pow(term1 + term2, nu / rho);
              },
        
              // Marginal product of labor for CES
              // MPₗ = ∂q/∂L = (ν/ρ) * (aL^ρ + (1-a)K^ρ)^(ν/ρ - 1) * a * ρ * L^(ρ-1)
              //     = ν * a * L^(ρ-1) * (aL^ρ + (1-a)K^ρ)^(ν/ρ - 1)
              marginalL: (L, K, config) => {
                const { ces_a, ces_sigma, ces_nu } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                const nu = ces_nu ?? 1.0;
        
                const rho = (ces_sigma - 1) / ces_sigma;
                const EPS = 1e-6;
        
                // Handle special case: ρ ≈ 0 (σ ≈ 1) → Cobb-Douglas marginal L with returns to scale
                if (Math.abs(rho) < EPS) {
                  // Cobb-Douglas marginal L with returns to scale: MPₗ = ν * a * L^(a-1) * K^(1-a) * (L^a * K^(1-a))^(ν-1)
                  const base = Math.pow(safeL, ces_a) * Math.pow(safeK, 1 - ces_a);
                  return nu * ces_a * Math.pow(safeL, ces_a - 1) * Math.pow(safeK, 1 - ces_a) * Math.pow(base, nu - 1);
                }
        
                const term1 = ces_a * Math.pow(safeL, rho);
                const term2 = (1 - ces_a) * Math.pow(safeK, rho);
                const totalTerm = Math.pow(term1 + term2, nu / rho - 1);
        
                return nu * ces_a * Math.pow(safeL, rho - 1) * totalTerm;
              },
        
              // Marginal product of capital for CES
              // MPₖ = ∂q/∂K = ν * (1-a) * K^(ρ-1) * (aL^ρ + (1-a)K^ρ)^(ν/ρ - 1)
              marginalK: (L, K, config) => {
                const { ces_a, ces_sigma, ces_nu } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                const nu = ces_nu ?? 1.0;
        
                const rho = (ces_sigma - 1) / ces_sigma;
                const EPS = 1e-6;
        
                // Handle special case: ρ ≈ 0 (σ ≈ 1) → Cobb-Douglas marginal K with returns to scale
                if (Math.abs(rho) < EPS) {
                  // Cobb-Douglas marginal K with returns to scale: MPₖ = ν * (1-a) * L^a * K^(-a) * (L^a * K^(1-a))^(ν-1)
                  const base = Math.pow(safeL, ces_a) * Math.pow(safeK, 1 - ces_a);
                  return nu * (1 - ces_a) * Math.pow(safeL, ces_a) * Math.pow(safeK, -ces_a) * Math.pow(base, nu - 1);
                }
        
                const term1 = ces_a * Math.pow(safeL, rho);
                const term2 = (1 - ces_a) * Math.pow(safeK, rho);
                const totalTerm = Math.pow(term1 + term2, nu / rho - 1);
        
                return nu * (1 - ces_a) * Math.pow(safeK, rho - 1) * totalTerm;
              },
        
              // MRTS for CES: MRTS = -(a/(1-a))(K/L)^(1/σ)
              mrts: (L, K, config) => {
                const { ces_a, ces_sigma } = config;
                const safeL = Math.max(0.001, L);
                return -(ces_a / (1 - ces_a)) * Math.pow(K / safeL, 1 / ces_sigma);
              },
        
              // Generate isoquant curve for CES function with adaptive spacing
              generateIsoquant: (targetOutput, config, maxL = 30, maxK = 30, points = 100) => {
                const { ces_a, ces_sigma, ces_nu } = config;
                const curve = [];
                const EPS = 1e-6;
                const nu = ces_nu ?? 1.0;
        
                // Convert sigma to rho for internal calculations
                const rho = (ces_sigma - 1) / ces_sigma;
        
                // Handle special cases
                if (Math.abs(rho) < EPS) {
                  // ρ ≈ 0: Cobb-Douglas case with returns to scale
                  // For q = (L^a * K^(1-a))^ν = targetOutput, we need L^a * K^(1-a) = targetOutput^(1/ν)
                  const adjustedOutput = Math.pow(targetOutput, 1 / nu);
                  return ProductionMath.productionFunctions['cobb-douglas'].generateIsoquant(
                    adjustedOutput,
                    { cd_A: 1, cd_alpha: ces_a, cd_beta: 1 - ces_a },
                    maxL,
                    maxK,
                    points
                  );
                } else if (Math.abs(rho - 1) < EPS) {
                  // ρ ≈ 1: Perfect substitutes case with returns to scale
                  // For q = (aL + (1-a)K)^ν = targetOutput, we need aL + (1-a)K = targetOutput^(1/ν)
                  const adjustedOutput = Math.pow(targetOutput, 1 / nu);
                  return ProductionMath.productionFunctions['linear'].generateIsoquant(
                    adjustedOutput,
                    { lin_a: ces_a, lin_b: 1 - ces_a },
                    maxL,
                    points
                  );
                } else {
                  // General CES case: analytical solution
                  // From q = (aL^ρ + (1-a)K^ρ)^(ν/ρ)
                  // Solve for K: aL^ρ + (1-a)K^ρ = q^(ρ/ν)
                  // K = ((q^(ρ/ν) - aL^ρ)/(1-a))^(1/ρ)
        
                  // Find minimum valid L by working backwards from K = maxK
                  const KLimit = maxK;
                  const qPowered = Math.pow(targetOutput, rho / nu);
                  const term = (qPowered - (1 - ces_a) * Math.pow(KLimit, rho)) / ces_a;
                  const LMin = Math.max(0.001, term > 0 ? Math.pow(term, 1 / rho) : 0.001);
        
                  // Add boundary point explicitly to avoid numerical precision errors with extreme exponents
                  // When ρ is very negative (low σ), recalculating K from LMin causes floating-point errors
                  if (LMin < maxL && term > 0) {
                    curve.push({ L: LMin, K: maxK });
                  }
        
                  for (let i = 1; i <= points; i++) {  // Start from i=1 to skip LMin recalculation
                    const t = i / points;  // t from 0 to 1
                    // Logarithmic spacing: more points near LMin where curve is steepest
                    const L = LMin + (maxL - LMin) * (Math.exp(t * Math.log(10)) - 1) / 9;
                    if (L <= 0.001) continue;
        
                    // Analytical solution with returns to scale
                    const termCalc = (qPowered - ces_a * Math.pow(L, rho)) / (1 - ces_a);
                    if (termCalc > 0) {
                      const K = Math.pow(termCalc, 1 / rho);
                      if (K > 0 && isFinite(K)) {
                        curve.push({ L, K });
                      }
                    }
                  }
                }
        
                return curve;
              }
            },
        
            'linear': {
              // Linear production function: q = aL + bK
              production: (L, K, config) => {
                const { lin_a, lin_b } = config;
                return lin_a * L + lin_b * K;
              },
        
              // Marginal product of labor: MPₗ = a (constant)
              marginalL: (L, K, config) => {
                const { lin_a } = config;
                return lin_a;
              },
        
              // Marginal product of capital: MPₖ = b (constant)
              marginalK: (L, K, config) => {
                const { lin_b } = config;
                return lin_b;
              },
        
              // MRTS for linear: MRTS = -a/b (constant)
              mrts: (L, K, config) => {
                const { lin_a, lin_b } = config;
                return -lin_a / lin_b;
              },
        
              // Generate isoquant curve (straight line) for linear function
              generateIsoquant: (targetOutput, config, maxL = 30, points = 100) => {
                const { lin_a, lin_b } = config;
                const curve = [];
        
                // For q = aL + bK, isoquant is: K = (q - aL)/b
                for (let i = 0; i <= points; i++) {
                  const L = (i / points) * maxL;
                  const K = (targetOutput - lin_a * L) / lin_b;
        
                  // Remove bound checking - rely on canvas clipping instead
                  // Linear functions are straight lines, so no need for adaptive spacing
                  if (isFinite(K)) {
                    curve.push({ L, K });
                  }
                }
        
                return curve;
              }
            },
        
            'fixed-proportions': {
              // Fixed-proportions production function: q = A * min{aL, bK}
              production: (L, K, config) => {
                const { fp_A, fp_a, fp_b } = config;
                return fp_A * Math.min(fp_a * L, fp_b * K);
              },
        
              // Marginal product of labor: MPₗ = A*a if aL < bK, 0 otherwise
              marginalL: (L, K, config) => {
                const { fp_A, fp_a, fp_b } = config;
                return (fp_a * L < fp_b * K) ? fp_A * fp_a : 0;
              },
        
              // Marginal product of capital: MPₖ = A*b if bK < aL, 0 otherwise
              marginalK: (L, K, config) => {
                const { fp_A, fp_a, fp_b } = config;
                return (fp_b * K < fp_a * L) ? fp_A * fp_b : 0;
              },
        
              // MRTS: Undefined at kink, 0 on horizontal, ∞ on vertical
              mrts: (L, K, config) => {
                const { fp_a, fp_b } = config;
                const aL = fp_a * L;
                const bK = fp_b * K;
        
                if (Math.abs(aL - bK) < 0.01) return NaN; // At the kink
                return (aL < bK) ? 0 : -Infinity;
              },
        
              // Generate L-shaped isoquant curve
              generateIsoquant: (targetOutput, config, maxL = 30, points = 100) => {
                const { fp_A, fp_a, fp_b } = config;
                const curve = [];
        
                // Corner point where aL = bK and q = A*aL = A*bK
                const cornerL = targetOutput / (fp_A * fp_a);
                const cornerK = targetOutput / (fp_A * fp_b);
        
                // Horizontal segment (excess capital)
                // Remove bound checking - let segment extend naturally, rely on canvas clipping
                const maxK = Math.max(cornerK * 3, 100); // Extend significantly beyond corner
                for (let i = 0; i <= points / 2; i++) {
                  const K = cornerK + (i / (points / 2)) * (maxK - cornerK);
                  if (isFinite(K)) {
                    curve.push({ L: cornerL, K });
                  }
                }
        
                // Vertical segment (excess labor)
                // Remove bound checking - let segment extend naturally, rely on canvas clipping
                const maxLExtended = Math.max(cornerL * 3, maxL * 2); // Extend significantly beyond corner
                for (let i = 0; i <= points / 2; i++) {
                  const L = cornerL + (i / (points / 2)) * (maxLExtended - cornerL);
                  if (isFinite(L)) {
                    curve.push({ L, K: cornerK });
                  }
                }
        
                return curve;
              }
            }
          },
        
          // Create 3D production surface from production function parameters
          create3DProductionSurface: (functionType, config, bounds = {}, resolution = 40) => {
            const { maxL = 30, maxK = 30, maxQ = 60 } = bounds;
            const productionFn = ProductionMath.productionFunctions[functionType].production;
            const vertices = [];
            const faces = [];
        
            // Generate vertices with production math
            for (let i = 0; i <= resolution; i++) {
              for (let j = 0; j <= resolution; j++) {
                const L = (i / resolution) * maxL;
                const K = (j / resolution) * maxK;
                const q = productionFn(L, K, config);
        
                // Map production coordinates to generic 3D coordinates
                // Capital on X-axis, Output on Y-axis, Labor on Z-axis
                vertices.push({ x: K, y: q, z: L });
              }
            }
        
            // Generate faces (triangles for mesh)
            for (let i = 0; i < resolution; i++) {

            border: none;
        }
        canvas {
            display: block;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: white;
        }
        .analysis-button {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .analysis-button:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }
        .analysis-button.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Load configuration and math modules -->
    <script type="text/javascript">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // Production-specific wrapper functions for generic slicing plane utilities
        const ProductionSlicingPlane = {
            create: (scene, analysisMode, params, bounds) => {
                // Remove existing production slicing planes
                CanvasUtils.remove3DSlicingPlanes(scene, 'productionSlicing');

                // Get analysis mode configuration
                const modeConfig = ProductionConfig.analysisModes[analysisMode];
                const planeType = modeConfig.slicingPlane;
                const planeConfig = ProductionConfig.slicingPlanes[planeType];

                // Make planes 20% larger while keeping centers linked to original bounds
                const planeSize = {
                    width: bounds.maxL * 1.2,
                    height: bounds.maxQ * 1.2,
                    depth: bounds.maxK * 1.2
                };

                // Center calculations use original bounds (not enlarged planeSize)
                let center, orientation;

                switch (planeType) {
                    case 'horizontal':
                        // Horizontal plane for isoquant analysis (constant output)
                        const outputLevel = params.outputLevel || 20;
                        center = { x: bounds.maxL / 2, y: outputLevel, z: bounds.maxK / 2 };
                        orientation = 'horizontal';
                        break;
                    case 'vertical-K':
                        // Vertical plane for capital analysis (constant K)
                        const fixedK = params.capitalLevel || 10;
                        center = { x: fixedK, y: bounds.maxQ / 2, z: bounds.maxL / 2 };
                        orientation = 'vertical-x';
                        break;
                    case 'vertical-L':
                        // Vertical plane for labor analysis (constant L)
                        const fixedL = params.laborLevel || 10;
                        center = { x: bounds.maxK / 2, y: bounds.maxQ / 2, z: fixedL };
                        orientation = 'vertical-z';
                        break;
                }

                // Create the slicing plane using generic utilities
                return CanvasUtils.add3DSlicingPlane(
                    scene,
                    center,
                    orientation,
                    planeConfig.color,
                    planeConfig.opacity,
                    planeSize,
                    'productionSlicing_' + planeType
                );
            },

            update: (scene, analysisMode, params, bounds) => {
                // Get analysis mode configuration
                const modeConfig = ProductionConfig.analysisModes[analysisMode];
                const planeType = modeConfig.slicingPlane;
                const planeName = 'productionSlicing_' + planeType;

                // Find the plane in the scene
                const plane = scene.children.find(child => child.name === planeName);
                if (!plane) return;

                // Calculate new center position based on current parameters
                let newCenter;

                switch (planeType) {
                    case 'horizontal':
                        const outputLevel = params.outputLevel || 20;
                        newCenter = { x: plane.position.x, y: outputLevel, z: plane.position.z };
                        break;
                    case 'vertical-K':
                        const fixedK = params.capitalLevel || 10;
                        newCenter = { x: fixedK, y: plane.position.y, z: plane.position.z };
                        break;
                    case 'vertical-L':
                        const fixedL = params.laborLevel || 10;
                        newCenter = { x: plane.position.x, y: plane.position.y, z: fixedL };
                        break;
                }

                // Update the plane position using generic utilities
                CanvasUtils.update3DSlicingPlane(plane, newCenter);
            }
        };

        // Main Production Function Visualization Component
        const ProductionVisualization = () => {
            // State for selected production function
            const [selectedProductionFunction, setSelectedProductionFunction] = useState('cobb-douglas');

            // State for analysis mode (isoquant, labor-product, capital-product)
            const [selectedAnalysisMode, setSelectedAnalysisMode] = useState('isoquant');

            // State for all parameters - initialized with defaults
            const [params, setParams] = useState(() => {
                const allDefaults = {};

                // Add analysis parameter defaults
                Object.keys(ProductionConfig.analysisParams).forEach(key => {
                    const param = ProductionConfig.analysisParams[key];
                    allDefaults[key] = param.default;
                });

                // Add production function parameter defaults
                Object.keys(ProductionConfig.productionFunctions).forEach(funcKey => {
                    const funcConfig = ProductionConfig.productionFunctions[funcKey];
                    Object.keys(funcConfig.config.params).forEach(paramKey => {
                        const param = funcConfig.config.params[paramKey];
                        allDefaults[paramKey] = param.default;
                    });
                });

                return allDefaults;
            });

            // State for slicing plane visibility (default: show)
            const [planesVisible, setPlanesVisible] = useState(true);

            // Canvas refs
            const scene3DRef = useRef();
            const topAnalysisRef = useRef();

            // 3D scene management
            const [scene3D, setScene3D] = useState(null);
            const [camera3D, setCamera3D] = useState(null);
            const [renderer3D, setRenderer3D] = useState(null);
            const [controls3D, setControls3D] = useState(null);

            // Helper functions for parameter management
            const updateParam = useCallback((key, value) => {
                setParams(prev => ({ ...prev, [key]: value }));
            }, []);

            const resetAnalysisParams = useCallback(() => {
                const analysisDefaults = {};
                Object.keys(ProductionConfig.analysisParams).forEach(key => {
                    const param = ProductionConfig.analysisParams[key];
                    analysisDefaults[key] = param.default;
                });
                setParams(prev => ({ ...prev, ...analysisDefaults }));
            }, []);

            const resetProductionParams = useCallback(() => {
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                const functionDefaults = {};
                Object.keys(funcConfig.config.params).forEach(key => {
                    const param = funcConfig.config.params[key];
                    functionDefaults[key] = param.default;
                });
                setParams(prev => ({ ...prev, ...functionDefaults }));
            }, [selectedProductionFunction]);

            // Calculate production analysis
            const productionAnalysis = useMemo(() => {
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                const productionFn = ProductionMath.productionFunctions[selectedProductionFunction];

                // Current input levels for analysis
                const L = params.laborLevel || 10;
                const K = params.capitalLevel || 10;

                // Calculate production values
                const output = productionFn.production(L, K, params);
                const marginalL = productionFn.marginalL(L, K, params);
                const marginalK = productionFn.marginalK(L, K, params);
                const mrts = productionFn.mrts(L, K, params);

                return {
                    currentInputs: { L, K },
                    currentOutput: output,
                    marginalProducts: { L: marginalL, K: marginalK },
                    mrts: mrts
                };
            }, [selectedProductionFunction, params]);

            // Generic function to render parameter controls
            const renderParameterControls = useCallback((parameterConfig) => {
                return Object.keys(parameterConfig).map(key => {
                    const param = parameterConfig[key];
                    return React.createElement('div', {
                        key: key,
                        className: "space-y-1"
                    }, [
                        React.createElement('label', {
                            key: 'label',
                            className: "block text-sm font-medium text-gray-600"
                        }, param.label),
                        React.createElement('div', {
                            key: 'slider-container',
                            className: "flex items-center space-x-3"
                        }, [
                            React.createElement('input', {
                                key: 'slider',
                                type: 'range',
                                min: param.min,
                                max: param.max,
                                step: param.step,
                                value: params[key] ?? param.default,
                                onChange: (e) => updateParam(key, Number(e.target.value)),
                                className: "flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider"
                            }),
                            React.createElement('span', {
                                key: 'value',
                                className: "text-sm font-mono text-gray-600 w-12 text-right"
                            }, (params[key] ?? param.default).toFixed(param.precision))
                        ])
                    ]);
                });
            }, [params, updateParam]);

            // Helper functions using the generic renderParameterControls
            const renderAnalysisParameterControls = useCallback(() => {
                return renderParameterControls(ProductionConfig.analysisParams);
            }, [renderParameterControls]);

            const renderProductionParameterControls = useCallback(() => {
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                return renderParameterControls(funcConfig.config.params);
            }, [renderParameterControls, selectedProductionFunction]);

            // MathJax rendering effect
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax typeset failed:', err));
                }
            }, [selectedProductionFunction]);

            // Helper function to render production function equation display
            const renderEquationDisplay = () => {
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                if (!funcConfig) return '';

                let generalFormLatex = funcConfig.mathForm;
                let currentValuesLatex = '';

                // Add specific form with actual parameter values
                switch(selectedProductionFunction) {
                    case 'cobb-douglas':
                        const A = (params.cd_A ?? 1).toFixed(2);
                        const alpha = (params.cd_alpha ?? 0.6).toFixed(2);
                        const beta = (params.cd_beta ?? 0.4).toFixed(2);
                        currentValuesLatex = `q = ${A}L<sup>${alpha}</sup>K<sup>${beta}</sup>`;
                        break;
                    case 'ces':
                        const a = (params.ces_a ?? 0.5).toFixed(2);
                        const sigma = (params.ces_sigma ?? 1.5).toFixed(2);
                        const nu = (params.ces_nu ?? 1.0).toFixed(2);
                        const b = (1 - (params.ces_a ?? 0.5)).toFixed(2);
                        const rho = ((sigma-1)/sigma).toFixed(2);
                        const outerExp = (nu / ((sigma-1)/sigma)).toFixed(2);
                        currentValuesLatex = `q = (${a}L<sup>${rho}</sup> + ${b}K<sup>${rho}</sup>)<sup>${outerExp}</sup>`;
                        break;
                    case 'linear':
                        const lin_a = (params.lin_a ?? 1).toFixed(2);
                        const lin_b = (params.lin_b ?? 1.2).toFixed(2);
                        currentValuesLatex = `q = ${lin_a}L + ${lin_b}K`;
                        break;
                    case 'fixed-proportions':
                        const fp_A = (params.fp_A ?? 1).toFixed(2);
                        const fp_a = (params.fp_a ?? 0.5).toFixed(2);
                        const fp_b = (params.fp_b ?? 0.8).toFixed(2);
                        currentValuesLatex = `q = ${fp_A} min(${fp_a}L, ${fp_b}K)`;
                        break;
                }

                const generalLatex = `$${generalFormLatex}$`;
                const specificLatex = currentValuesLatex;

                return React.createElement('div', {
                    key: 'math-equation',
                    className: "text-center"
                }, [
                    React.createElement('div', {
                        key: 'general-form',
                        className: "mb-1"
                    }, generalLatex),
                    React.createElement('div', {
                        key: 'specific-form',
                        className: "text-sm text-blue-600",
                        dangerouslySetInnerHTML: { __html: specificLatex }
                    })
                ]);
            };

            // Initialize 3D scene
            useEffect(() => {
                if (!scene3DRef.current) return;

                const container = scene3DRef.current;
                const { scene, camera, renderer } = CanvasUtils.init3DCanvas(container, ProductionConfig.layout.canvas3D.width, ProductionConfig.layout.canvas3D.height);

                // Set up lighting
                CanvasUtils.setup3DLighting(scene, ProductionConfig.scene3D.lighting);

                // Add axes
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                const bounds = funcConfig.config.surface3D;
                CanvasUtils.add3DAxes(scene, {
                    maxX: bounds.maxK,    // Capital on X-axis
                    maxY: bounds.maxQ,    // Output on Y-axis
                    maxZ: bounds.maxL,    // Labor on Z-axis
                    xLabel: 'Capital',
                    yLabel: 'Output',
                    zLabel: 'Labor'
                });

                // Set up camera controls
                const controls = CanvasUtils.setup3DOrbitControls(camera, renderer, ProductionConfig.scene3D.camera.target, ProductionConfig.scene3D.controls);
                camera.position.set(
                    ProductionConfig.scene3D.camera.position.x,
                    ProductionConfig.scene3D.camera.position.y,
                    ProductionConfig.scene3D.camera.position.z
                );
                controls.update();

                // Start animation loop
                const animate = () => {
                    requestAnimationFrame(animate);
                    controls.update();
                    CanvasUtils.render3DScene(renderer, scene, camera);
                };
                animate();

                setScene3D(scene);
                setCamera3D(camera);
                setRenderer3D(renderer);
                setControls3D(controls);

                // Cleanup function
                return () => {
                    CanvasUtils.dispose3DCanvas(renderer);
                };
            }, []);

            // Update 3D production surface when function or parameters change
            useEffect(() => {
                if (!scene3D || !renderer3D) return;

                // Remove existing production surfaces (both main and wireframe)
                const surfacesToRemove = scene3D.children.filter(child =>
                    child.name === 'productionSurface' || child.name === 'productionSurfaceWireframe'
                );
                surfacesToRemove.forEach(surface => {
                    scene3D.remove(surface);
                    surface.geometry?.dispose();
                    surface.material?.dispose();
                });

                // Create new production surface
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                const bounds = funcConfig.config.surface3D;

                const geometry = ProductionMath.create3DProductionSurface(
                    selectedProductionFunction,
                    params,
                    bounds,
                    bounds.resolution
                );

                const material = new THREE.MeshLambertMaterial({
                    color: bounds.meshColor,
                    wireframe: false,
                    transparent: true,
                    opacity: 0.2,
                    side: THREE.DoubleSide
                });

                const surface = new THREE.Mesh(geometry, material);
                surface.name = 'productionSurface';
                surface.renderOrder = 1; // Render before slicing planes
                scene3D.add(surface);

                // Add wireframe version
                const wireframeMaterial = new THREE.MeshBasicMaterial({
                    color: bounds.wireframeColor,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.9
                });

                const wireframeSurface = new THREE.Mesh(geometry.clone(), wireframeMaterial);
                wireframeSurface.name = 'productionSurfaceWireframe';
                wireframeSurface.renderOrder = 0; // Render first (wireframe behind everything)
                scene3D.add(wireframeSurface);

            }, [scene3D, renderer3D, selectedProductionFunction, params]);

            // Create and update slicing planes based on analysis mode
            useEffect(() => {
                if (!scene3D) return;

                // Get surface bounds for current production function
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                const bounds = funcConfig.config.surface3D;

                // Create slicing plane only if planes are visible
                if (planesVisible) {
                    ProductionSlicingPlane.create(scene3D, selectedAnalysisMode, params, bounds);
                } else {
                    // Remove any existing slicing planes when hidden
                    CanvasUtils.remove3DSlicingPlanes(scene3D, 'productionSlicing');
                }

            }, [scene3D, selectedAnalysisMode, selectedProductionFunction, planesVisible]);

            // Update slicing plane positions when parameters change
            useEffect(() => {
                if (!scene3D || !planesVisible) return;

                // Get surface bounds for current production function
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                const bounds = funcConfig.config.surface3D;

                // Update slicing plane position using wrapper function
                ProductionSlicingPlane.update(scene3D, selectedAnalysisMode, params, bounds);

            }, [scene3D, selectedAnalysisMode, params, selectedProductionFunction, planesVisible]);

            // Draw top analysis visualization
            useEffect(() => {
                if (!topAnalysisRef.current || !productionAnalysis) return;

                const canvas = topAnalysisRef.current;
                const canvasConfig = ProductionConfig.layout.analysisCanvas.topCanvas;
                const { ctx, width, height } = CanvasUtils.initCanvas(canvas, canvasConfig.width, canvasConfig.height);
                const margins = CanvasUtils.calculateMargins(width, height);

                // Render based on analysis mode
                switch (selectedAnalysisMode) {
                    case 'isoquant':
                        renderIsoquantView(ctx, width, height, margins);
                        break;
                    case 'labor-product':
                        renderTotalLaborProductView(ctx, width, height, margins);
                        break;
                    case 'capital-product':
                        renderTotalCapitalProductView(ctx, width, height, margins);
                        break;
                }

            }, [selectedProductionFunction, selectedAnalysisMode, params, productionAnalysis]);


            // Rendering functions moved from canvasUtils to component
            const renderIsoquantView = useCallback((ctx, width, height, margins) => {
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                const visualConfig = funcConfig.config.isoquantView;
                const transform = CanvasUtils.createTransform(margins, width, height, visualConfig.maxL, visualConfig.maxK);

                // Draw coordinate system
                const gridConfig = {
                    xPoints: visualConfig.gridPoints.x,
                    yPoints: visualConfig.gridPoints.y
                };

                CanvasUtils.drawGrid(ctx, margins, width, height, transform, gridConfig);
                CanvasUtils.drawAxes(ctx, margins, width, height, 'Labor (L)', 'Capital (K)');
                CanvasUtils.drawTicks(ctx, margins, width, height, transform, gridConfig);

                CanvasUtils.setupClipping(ctx, margins, width, height);

                // Generate and draw isoquant curve
                const targetOutput = params.outputLevel || 20;
                const productionFn = ProductionMath.productionFunctions[selectedProductionFunction];
                const isoquantCurve = productionFn.generateIsoquant(targetOutput, params, visualConfig.maxL, visualConfig.maxK);

                if (isoquantCurve && isoquantCurve.length > 0) {
                    const curvePoints = isoquantCurve.map(point => ({ x: point.L, y: point.K }));

                    if (selectedProductionFunction === 'fixed-proportions') {
                        const cornerPoint = curvePoints[0];
                        if (cornerPoint) {
                            CanvasUtils.drawLShape(ctx, cornerPoint.x, cornerPoint.y, visualConfig.maxL, visualConfig.maxK, transform, {
                                color: '#1e40af',
                                lineWidth: 3
                            });
                        }
                    } else {
                        CanvasUtils.drawCurve(ctx, curvePoints, transform, {
                            color: '#1e40af',
                            lineWidth: 3
                        });
                    }
                }

                CanvasUtils.restoreClipping(ctx);
            }, [selectedProductionFunction, params]);


            const renderTotalLaborProductView = useCallback((ctx, width, height, margins) => {
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                const visualConfig = funcConfig.config.totalProductView;
                const fixedK = params.capitalLevel || 10;

                // Generate total product curve
                const totalCurve = ProductionMath.generateTotalProductCurve(
                    selectedProductionFunction, params, 'L', fixedK, visualConfig.maxInput
                );

                if (totalCurve && totalCurve.length > 0) {
                    // Use fixed maxOutput from configuration for consistent scaling
                    const transform = CanvasUtils.createTransform(margins, width, height, visualConfig.maxInput, visualConfig.maxOutput);

                    // Draw coordinate system
                    const gridConfig = {
                        xPoints: visualConfig.gridPoints.x,
                        yPoints: visualConfig.gridPoints.y
                    };

                    CanvasUtils.drawGrid(ctx, margins, width, height, transform, gridConfig);
                    CanvasUtils.drawAxes(ctx, margins, width, height, 'Labor (L)', 'Output (Q)');
                    CanvasUtils.drawTicks(ctx, margins, width, height, transform, gridConfig);

                    CanvasUtils.setupClipping(ctx, margins, width, height);

                    // Draw curve
                    const curvePoints = totalCurve.map(point => ({ x: point.input, y: point.output }));
                    CanvasUtils.drawCurve(ctx, curvePoints, transform, {
                        color: '#059669',
                        lineWidth: 3
                    });

                    // Highlight current point
                    const currentL = params.laborLevel || 10;
                    const currentOutput = productionAnalysis.currentOutput;
                    CanvasUtils.highlightPoint(ctx, currentL, currentOutput, transform, {
                        outerColor: '#dc2626',
                        innerColor: '#ffffff'
                    });

                    CanvasUtils.restoreClipping(ctx);
                }
            }, [selectedProductionFunction, params, productionAnalysis]);


            const renderTotalCapitalProductView = useCallback((ctx, width, height, margins) => {
                const funcConfig = ProductionConfig.productionFunctions[selectedProductionFunction];
                const visualConfig = funcConfig.config.totalProductView;
                const fixedL = params.laborLevel || 10;

                // Generate total product curve
                const totalCurve = ProductionMath.generateTotalProductCurve(
                    selectedProductionFunction, params, 'K', fixedL, visualConfig.maxInput
                );

                if (totalCurve && totalCurve.length > 0) {
                    // Use fixed maxOutput from configuration for consistent scaling
                    const transform = CanvasUtils.createTransform(margins, width, height, visualConfig.maxInput, visualConfig.maxOutput);

                    // Draw coordinate system
                    const gridConfig = {
                        xPoints: visualConfig.gridPoints.x,
                        yPoints: visualConfig.gridPoints.y
                    };

                    CanvasUtils.drawGrid(ctx, margins, width, height, transform, gridConfig);
                    CanvasUtils.drawAxes(ctx, margins, width, height, 'Capital (K)', 'Output (Q)');
                    CanvasUtils.drawTicks(ctx, margins, width, height, transform, gridConfig);

                    CanvasUtils.setupClipping(ctx, margins, width, height);

                    // Draw curve
                    const curvePoints = totalCurve.map(point => ({ x: point.input, y: point.output }));
                    CanvasUtils.drawCurve(ctx, curvePoints, transform, {
                        color: '#dc2626',
                        lineWidth: 3
                    });

                    // Highlight current point
                    const currentK = params.capitalLevel || 10;
                    const currentOutput = productionAnalysis.currentOutput;
                    CanvasUtils.highlightPoint(ctx, currentK, currentOutput, transform, {
                        outerColor: '#dc2626',
                        innerColor: '#ffffff'
                    });

                    CanvasUtils.restoreClipping(ctx);
                }
            }, [selectedProductionFunction, params, productionAnalysis]);


            return React.createElement('div', {
                className: "min-h-screen p-6"
            }, [
                // Header
                React.createElement('div', {
                    key: 'header',
                    className: "text-center mb-4"
                }, [
                    React.createElement('h1', {
                        key: 'title',
                        className: "text-3xl font-bold text-gray-800 mb-2"
                    }, 'Production Function Visualization')
                ]),

                // Main content grid
                React.createElement('div', {
                    key: 'content',
                    className: "grid grid-cols-1 lg:grid-cols-3 gap-3 max-w-7xl mx-auto"
                }, [
                    // Left column: Parameter controls
                    React.createElement('div', {
                        key: 'controls',
                        className: "space-y-3"
                    }, [
                        // Production Function Selector
                        React.createElement('div', {
                            key: 'function-selector',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('h3', {
                                key: 'selector-title',
                                className: "text-lg font-semibold text-gray-700 mb-4"
                            }, 'Production Function'),
                            React.createElement('select', {
                                key: 'function-dropdown',
                                value: selectedProductionFunction,
                                onChange: (e) => setSelectedProductionFunction(e.target.value),
                                className: "w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            },
                                Object.keys(ProductionConfig.productionFunctions).map(funcKey =>
                                    React.createElement('option', {
                                        key: funcKey + '-option',
                                        value: funcKey
                                    }, ProductionConfig.productionFunctions[funcKey].name)
                                )
                            )
                        ]),

                        // Analysis Parameters panel
                        React.createElement('div', {
                            key: 'analysis-parameters',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('div', {
                                key: 'analysis-param-header',
                                className: "flex justify-between items-center mb-4"
                            }, [
                                React.createElement('h3', {
                                    key: 'analysis-param-title',
                                    className: "text-lg font-semibold text-gray-700"
                                }, 'Input/Output Levels'),
                                React.createElement('button', {
                                    key: 'reset-analysis-button',
                                    onClick: resetAnalysisParams,
                                    className: "text-sm px-2 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors"
                                }, 'Reset')
                            ]),
                            React.createElement('div', {
                                key: 'analysis-param-controls',
                                className: "space-y-3"
                            }, renderAnalysisParameterControls())
                        ]),

                        // Production Function Parameters panel
                        React.createElement('div', {
                            key: 'production-parameters',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('div', {
                                key: 'prod-param-header',
                                className: "flex justify-between items-center mb-4"
                            }, [
                                React.createElement('h3', {
                                    key: 'prod-param-title',
                                    className: "text-lg font-semibold text-gray-700"
                                }, 'Production Function Parameters'),
                                React.createElement('button', {
                                    key: 'reset-prod-button',
                                    onClick: resetProductionParams,
                                    className: "text-sm px-2 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors"
                                }, 'Reset')
                            ]),
                            React.createElement('div', {
                                key: 'equation-display',
                                className: "text-center mb-4 p-2 bg-gray-50 rounded"
                            }, renderEquationDisplay()),
                            React.createElement('div', {
                                key: 'prod-param-controls',
                                className: "space-y-3"
                            }, renderProductionParameterControls())
                        ])
                    ]),

                    // Center column: 3D visualization and results
                    React.createElement('div', {
                        key: 'center-container',
                        className: "space-y-3"
                    }, [
                        // 3D production surface visualization
                        React.createElement('div', {
                            key: '3d-viz',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('div', {
                                key: '3d-header',
                                className: "mb-4"
                            }, [
                                React.createElement('h3', {
                                    key: '3d-title',
                                    className: "text-lg font-semibold text-gray-700 mb-2"
                                }, 'Production Function (3D View)'),

                                React.createElement('div', {
                                    key: '3d-controls',
                                    className: "flex gap-2"
                                }, [
                                    React.createElement('button', {
                                        key: 'toggle-plane-button',
                                        onClick: () => setPlanesVisible(!planesVisible),
                                        className: planesVisible
                                            ? "text-sm px-3 py-1 border border-blue-400 rounded text-white bg-blue-500 hover:bg-blue-600 transition-colors"
                                            : "text-sm px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors"
                                    }, planesVisible ? 'Hide 2D Slice Plane' : 'Show 2D Slice Plane'),
                                    React.createElement('button', {
                                        key: 'reset-3d-button',
                                        onClick: () => {
                                            if (camera3D && controls3D) {
                                                CanvasUtils.reset3DView(camera3D, controls3D, ProductionConfig.scene3D.camera.position, ProductionConfig.scene3D.camera.target);
                                            }
                                        },
                                        className: "text-sm px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors"
                                    }, 'Reset View')
                                ])
                            ]),

                            React.createElement('div', {
                                key: '3d-container',
                                ref: scene3DRef,
                                style: { width: ProductionConfig.layout.canvas3D.width + 'px', height: ProductionConfig.layout.canvas3D.height + 'px', margin: '0 auto' }
                            }),

                            // 3D controls instructions
                            React.createElement('div', {
                                key: '3d-controls-help',
                                className: "text-xs text-gray-500 text-center mt-2 italic"
                            }, 'Drag to rotate • Scroll to zoom • Right-drag to pan'),

                            // Explanatory note about production function and slicing planes
                            React.createElement('div', {
                                key: 'production-function-note',
                                className: "text-sm text-gray-600 mt-4 p-2 bg-blue-50 rounded border-l-4 border-blue-200 space-y-2"
                            }, [
                                React.createElement('p', {
                                    key: 'production-explanation'
                                }, 'The 3D production function surface shows the maximum output that can be produced from different combinations of inputs (labor and capital).'),
                                React.createElement('p', {
                                    key: 'slicing-explanation'
                                }, 'A slicing plane visualizes the relationship between any two variables while holding the third constant. These cross-sections reveal isoquants (constant output) and total product curves (output as a function of one input).')
                            ])
                        ]),

                    ]),

                    // Right column: Independent analysis visualizations
                    React.createElement('div', {
                        key: 'analysis-viz',
                        className: "space-y-3"
                    }, [
                        // Analysis mode selector
                        React.createElement('div', {
                            key: 'analysis-mode-selector',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('h3', {
                                key: 'mode-title',
                                className: "text-lg font-semibold text-gray-700 mb-4"
                            }, '2D View Mode'),
                            React.createElement('div', {
                                key: 'analysis-mode-buttons',
                                className: "flex gap-2"
                            }, Object.keys(ProductionConfig.analysisModes).map(modeKey =>
                                React.createElement('button', {
                                    key: `${modeKey}-button`,
                                    onClick: () => setSelectedAnalysisMode(modeKey),
                                    className: `analysis-button ${selectedAnalysisMode === modeKey ? 'active' : ''}`
                                }, ProductionConfig.analysisModes[modeKey].buttonLabel)
                            )),

                            // Explanatory note about 2D view controls
                            React.createElement('div', {
                                key: '2d-controls-note',
                                className: "text-sm text-gray-600 mt-4 p-2 bg-blue-50 rounded border-l-4 border-blue-200"
                            }, 'Select a variable to hold constant. Use Input/Output controls to adjust its level.')
                        ]),

                        // Top analysis visualization (independent panel)
                        React.createElement('div', {
                            key: 'top-analysis-viz',
                            className: "bg-white p-4 rounded-lg shadow-sm border"
                        }, [
                            React.createElement('h3', {
                                key: 'top-title',
                                className: "text-lg font-semibold text-gray-700 mb-2"
                            }, ProductionConfig.analysisModes[selectedAnalysisMode]?.topView?.name || 'Primary View'),

                            // Dynamic explanatory text based on analysis mode and current parameters
                            React.createElement('div', {
                                key: 'explanation-text',
                                className: "text-sm text-gray-600 mb-4 p-2 bg-blue-50 rounded border-l-4 border-blue-200"
                            }, (() => {
                                // Generate dynamic explanatory text based on analysis mode and current parameters
                                let explanation = '';
                                switch(selectedAnalysisMode) {
                                    case 'isoquant':
                                        const outputLevel = params.outputLevel || 10;
                                        explanation = `All combinations of labor and capital that can produce ${outputLevel} units of output. The slope of the isoquant curve is the Marginal Rate of Technical Substitution (MRTS).`;
                                        break;
                                    case 'labor-product':
                                        const capitalLevel = params.capitalLevel || 10;
                                        explanation = `Output produced using different amounts of labor, holding capital constant at ${capitalLevel} units. The slope of this curve is the Marginal Product of Labor.`;
                                        break;
                                    case 'capital-product':
                                        const laborLevel = params.laborLevel || 10;
                                        explanation = `Output produced using different amounts of capital, holding labor constant at ${laborLevel} units. The slope of this curve is the Marginal Product of Capital.`;
                                        break;
                                }

                                return explanation;
                            })()),

                            React.createElement('canvas', {
                                key: 'top-analysis-canvas',
                                ref: topAnalysisRef,
                                width: ProductionConfig.layout.analysisCanvas.topCanvas.width,
                                height: ProductionConfig.layout.analysisCanvas.topCanvas.height
                            })
                        ]),

                    ])
                ])
            ]);
        };

        // Initialize app after all scripts are loaded
        const initializeApp = () => {
            console.log('Checking for required modules...');
            console.log('ProductionConfig:', !!window.ProductionConfig);
            console.log('ProductionMath:', !!window.ProductionMath);
            console.log('CanvasUtils:', !!window.CanvasUtils);
            console.log('THREE:', !!window.THREE);

            if (window.ProductionConfig && window.ProductionMath && window.CanvasUtils && window.THREE) {
                console.log('All modules loaded, initializing React app...');
                try {
                    const root = ReactDOM.createRoot(document.getElementById('root'));
                    root.render(React.createElement(ProductionVisualization));
                    console.log('React app rendered successfully!');
                } catch (error) {
                    console.error('Error rendering React app:', error);
                }
            } else {
                console.log('Waiting for modules to load...');
                setTimeout(initializeApp, 100);
            }
        };

        // Start initialization
        initializeApp();
    </script>
</body>
</html>
