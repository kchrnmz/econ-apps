<body>
    <div id="root"></div>

    <!-- Load configuration and math modules -->
    <script type="text/javascript">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // Main Cost Minimization Problem Component
        const CostVisualization = () => {
            // State for selected production function
            const [selectedProductionFunction, setSelectedProductionFunction] = useState('cobb-douglas');

            // State for conditional demand type (labor or capital)
            const [demandType, setDemandType] = useState('labor');

            // State for all parameters - initialized with defaults
            const [params, setParams] = useState(() => {
                const costDefaults = {};
                const costParams = CostConfig.costParams;
                Object.keys(costParams).forEach(key => {
                    costDefaults[key] = costParams[key].default;
                });

                const prodFunction = CostConfig.productionFunctions['cobb-douglas'];
                const prodParams = prodFunction.config.productionParams;
                Object.keys(prodParams).forEach(key => {
                    costDefaults[key] = prodParams[key].default;
                });

                return costDefaults;
            });

            // Canvas refs
            const mainCanvasRef = useRef();
            const demandCanvasRef = useRef();
            const costExpansionCanvasRef = useRef();

            // Helper functions for parameter management
            const updateParam = useCallback((key, value) => {
                setParams(prev => ({ ...prev, [key]: value }));
            }, []);

            const resetCostParams = useCallback(() => {
                const costDefaults = {};
                const costParams = CostConfig.costParams;
                Object.keys(costParams).forEach(key => {
                    costDefaults[key] = costParams[key].default;
                });
                setParams(prev => ({ ...prev, ...costDefaults }));
            }, []);

            const resetProductionParams = useCallback(() => {
                const prodDefaults = {};
                const prodFunction = CostConfig.productionFunctions[selectedProductionFunction];
                const prodParams = prodFunction.config.productionParams;
                Object.keys(prodParams).forEach(key => {
                    prodDefaults[key] = prodParams[key].default;
                });
                setParams(prev => ({ ...prev, ...prodDefaults }));
            }, [selectedProductionFunction]);

            // Calculate cost minimization optimization
            const optimizationAnalysis = useMemo(() => {
                const targetOutput = params.targetOutput;
                const wageRate = params.wageRate;
                const rentalRate = params.rentalRate;

                // Get production function configuration
                const prodFunction = CostConfig.productionFunctions[selectedProductionFunction];
                const prodConfig = {};

                // Extract production function parameters from params
                Object.keys(prodFunction.config.productionParams).forEach(key => {
                    prodConfig[key] = params[key];
                });

                // Solve CMP using CostMath
                const solution = CostMath.solveCMP(
                    targetOutput,
                    wageRate,
                    rentalRate,
                    selectedProductionFunction,
                    prodConfig
                );

                return {
                    optimalBundle: { L: solution.L, K: solution.K },
                    totalCost: solution.totalCost,
                    mrts: solution.mrts,
                    isCornerSolution: solution.isCornerSolution
                };
            }, [params, selectedProductionFunction]);

            // Draw main visualization (production space with isoquants and isocost lines)
            useEffect(() => {
                if (!mainCanvasRef.current || !optimizationAnalysis) return;

                const canvas = mainCanvasRef.current;
                const { ctx, width, height } = CanvasUtils.initCanvas(canvas, 400, 320);
                const margins = CanvasUtils.calculateMargins(width, height);

                // Get visualization config
                const prodFunction = CostConfig.productionFunctions[selectedProductionFunction];
                const visualConfig = prodFunction.config.mainVisualization;
                const transform = CanvasUtils.createTransform(margins, width, height, visualConfig.maxL, visualConfig.maxK);

                // Draw coordinate system
                const gridConfig = {
                    xPoints: visualConfig.gridPoints.x,
                    yPoints: visualConfig.gridPoints.y
                };

                CanvasUtils.drawGrid(ctx, margins, width, height, transform, gridConfig);
                CanvasUtils.drawAxes(ctx, margins, width, height, 'Labor (L)', 'Capital (K)');
                CanvasUtils.drawTicks(ctx, margins, width, height, transform, gridConfig);

                CanvasUtils.setupClipping(ctx, margins, width, height);

                // Helper function to draw isoquant curves
                const drawIsoquant = (ctx, isoquantData, transform, style) => {
                    // Handle L-shaped curves first (for fixed-proportions production)
                    if (isoquantData.curveType === 'L-shaped') {
                        const { cornerL, cornerK, maxL, maxK } = isoquantData.metadata;
                        CanvasUtils.drawLShape(ctx, cornerL, cornerK, maxL, maxK, transform, style);
                        return;
                    }

                    if (!isoquantData || isoquantData.length <= 1) return;

                    // Check if this is a linear curve
                    if (selectedProductionFunction === 'linear' && isoquantData.length === 2) {
                        // Use efficient line drawing for linear curves
                        CanvasUtils.drawLine(ctx,
                            isoquantData[0].L, isoquantData[0].K,
                            isoquantData[1].L, isoquantData[1].K,
                            transform, style);
                    } else {
                        // Standard smooth curve drawing
                        CanvasUtils.drawCurve(ctx, isoquantData.map(p => ({ x: p.L, y: p.K })), transform, style);
                    }
                };

                // Extract production function parameters
                const prodConfig = {};
                Object.keys(prodFunction.config.productionParams).forEach(key => {
                    prodConfig[key] = params[key];
                });

                // Draw background isoquants using equally-spaced output levels
                const dynamicOutputLevels = CostMath.calculateDynamicOutputLevels(
                    selectedProductionFunction, prodConfig, visualConfig.maxL, visualConfig.maxK,
                    visualConfig.backgroundCurvePoints
                );

                // Calculate quantity range for color mapping
                const paramRanges = prodFunction.config.productionParams;
                const quantityRange = CostMath.productionFunctions[selectedProductionFunction].getQuantityRange(
                    paramRanges, visualConfig.maxL, visualConfig.maxK
                );

                // Define color gradient: light blue to 80% of target blue
                const lightBlue = '#bfdbfe';
                const targetBlue = '#1e40af';
                // Calculate 80% darkness: interpolate 80% from light to target
                const darkBlue = CanvasUtils.interpolateColor(0.99, 0, 1, lightBlue, targetBlue);

                dynamicOutputLevels.forEach(outputLevel => {
                    const isoquantData = CostMath.productionFunctions[selectedProductionFunction].generateIsoquant(
                        outputLevel, prodConfig, visualConfig.maxL, visualConfig.maxK
                    );

                    // Calculate color based on quantity level
                    const color = CanvasUtils.interpolateColor(
                        outputLevel, quantityRange.minQ, quantityRange.maxQ,
                        lightBlue, darkBlue
                    );

                    drawIsoquant(ctx, isoquantData, transform, {
                        color: color,
                        lineWidth: 1
                    });
                });

                // Get cost and price parameters for isocost line
                const optimalCost = optimizationAnalysis.totalCost;
                const wageRate = params.wageRate;
                const rentalRate = params.rentalRate;

                // Draw target isoquant (bold dark blue)
                const targetIsoquant = CostMath.productionFunctions[selectedProductionFunction].generateIsoquant(
                    params.targetOutput, prodConfig, visualConfig.maxL, visualConfig.maxK
                );

                drawIsoquant(ctx, targetIsoquant, transform, {
                    color: '#1e40af',
                    lineWidth: 3
                });

                // Draw optimal isocost line (red, tangent to target isoquant)
                const optimalEndpoints = CostMath.getIsocostLineEndpoints(
                    optimalCost, wageRate, rentalRate, visualConfig.maxL, visualConfig.maxK
                );

                CanvasUtils.drawLine(ctx,
                    0, optimalEndpoints.capitalIntercept,
                    optimalEndpoints.laborIntercept, 0,
                    transform, {
                        color: '#059669',
                        lineWidth: 3
                    });

                CanvasUtils.restoreClipping(ctx);

                // Highlight optimal bundle
                const optimalL = optimizationAnalysis.optimalBundle.L;
                const optimalK = optimizationAnalysis.optimalBundle.K;

                CanvasUtils.highlightPoint(ctx, optimalL, optimalK, transform, {
                    outerColor: '#dc2626',
                    innerColor: '#ffffff'
                });

                // Add optimal bundle label with coordinates
                const bundleLabel = `L*=${optimalL.toFixed(1)}, K*=${optimalK.toFixed(1)}`;
                CanvasUtils.addLabel(ctx, bundleLabel, optimalL, optimalK, transform, {
                    color: '#dc2626',
                    fontWeight: 'bold',
                    offsetX: 10,
                    offsetY: -10,
                    fontSize: 14
                });

            }, [params, selectedProductionFunction, optimizationAnalysis]);

            // Draw conditional demand curve (labor or capital)
            useEffect(() => {
                if (!demandCanvasRef.current) return;

                const canvas = demandCanvasRef.current;
                const { ctx, width, height } = CanvasUtils.initCanvas(canvas, 400, 280);
                const margins = CanvasUtils.calculateMargins(width, height);

                // Get visualization config
                const prodFunction = CostConfig.productionFunctions[selectedProductionFunction];
                const visualConfig = prodFunction.config.conditionalDemandVisualization[demandType];

                // Extract production function parameters
                const prodConfig = {};
                Object.keys(prodFunction.config.productionParams).forEach(key => {
                    prodConfig[key] = params[key];
                });

                let demandCurve, transform, axisLabels, curveData, currentX, currentY, pointLabel;

                if (demandType === 'labor') {
                    // Generate conditional labor demand curve: L*(w|r,q)
                    const wageRange = { min: 0.05, max: visualConfig.maxW };
                    demandCurve = CostMath.generateConditionalLaborDemand(
                        wageRange,
                        params.rentalRate,
                        params.targetOutput,
                        selectedProductionFunction,
                        prodConfig,
                        50
                    );

                    // Create transform: X-axis = Labor (L), Y-axis = Wage rate (w)
                    transform = CanvasUtils.createTransform(
                        margins, width, height,
                        visualConfig.maxL,
                        visualConfig.maxW
                    );

                    axisLabels = { x: 'Labor (L)', y: 'Wage (w)' };

                    // Convert from {wageRate, laborDemand} to {x, y} format
                    curveData = demandCurve.map(point => ({
                        x: point.laborDemand,
                        y: point.wageRate
                    }));

                    // Current equilibrium point
                    currentX = optimizationAnalysis.optimalBundle.L;
                    currentY = params.wageRate;
                    pointLabel = `w=${currentY.toFixed(1)}, L*=${currentX.toFixed(1)}`;

                } else {
                    // Generate conditional capital demand curve: K*(r|w,q)
                    const rentalRateRange = { min: 0.05, max: visualConfig.maxR };
                    demandCurve = CostMath.generateConditionalCapitalDemand(
                        rentalRateRange,
                        params.wageRate,
                        params.targetOutput,
                        selectedProductionFunction,
                        prodConfig,
                        50
                    );

                    // Create transform: X-axis = Capital (K), Y-axis = Rental rate (r)
                    transform = CanvasUtils.createTransform(
                        margins, width, height,
                        visualConfig.maxK,
                        visualConfig.maxR
                    );

                    axisLabels = { x: 'Capital (K)', y: 'Rental Rate (r)' };

                    // Convert from {rentalRate, capitalDemand} to {x, y} format
                    curveData = demandCurve.map(point => ({
                        x: point.capitalDemand,
                        y: point.rentalRate
                    }));

                    // Current equilibrium point
                    currentX = optimizationAnalysis.optimalBundle.K;
                    currentY = params.rentalRate;
                    pointLabel = `r=${currentY.toFixed(1)}, K*=${currentX.toFixed(1)}`;
                }

                // Draw coordinate system
                const gridConfig = {
                    xPoints: visualConfig.gridPoints.x,
                    yPoints: visualConfig.gridPoints.y
                };

                CanvasUtils.drawGrid(ctx, margins, width, height, transform, gridConfig);
                CanvasUtils.drawAxes(ctx, margins, width, height, axisLabels.x, axisLabels.y);
                CanvasUtils.drawTicks(ctx, margins, width, height, transform, gridConfig);

                CanvasUtils.setupClipping(ctx, margins, width, height);

                // Draw the conditional demand curve
                CanvasUtils.drawCurve(ctx, curveData, transform, {
                    color: '#d97706',
                    lineWidth: 3
                });

                CanvasUtils.restoreClipping(ctx);

                // Highlight current equilibrium point
                CanvasUtils.highlightPoint(ctx, currentX, currentY, transform, {
                    outerColor: '#dc2626',
                    innerColor: '#ffffff'
                });

                // Add label for current point
                CanvasUtils.addLabel(ctx, pointLabel, currentX, currentY, transform, {
                    color: '#dc2626',
                    fontWeight: 'bold',
                    offsetX: 10,
                    offsetY: -10,
                    fontSize: 14
                });

            }, [params, selectedProductionFunction, optimizationAnalysis, demandType]);

            // Draw cost expansion path
            useEffect(() => {
                if (!costExpansionCanvasRef.current) return;

                const canvas = costExpansionCanvasRef.current;
                const { ctx, width, height } = CanvasUtils.initCanvas(canvas, 400, 280);
                const margins = CanvasUtils.calculateMargins(width, height);

                // Get visualization config
                const prodFunction = CostConfig.productionFunctions[selectedProductionFunction];
                const visualConfig = prodFunction.config.costExpansionVisualization;

                // Extract production function parameters
                const prodConfig = {};
                Object.keys(prodFunction.config.productionParams).forEach(key => {
                    prodConfig[key] = params[key];
                });

                // Generate cost expansion path: C(w,r,q)
                // Output range from config
                const outputRange = { min: 0.05, max: visualConfig.maxQ };
                const costCurve = CostMath.generateCostExpansionPath(
                    outputRange,
                    params.wageRate,
                    params.rentalRate,
                    selectedProductionFunction,
                    prodConfig,
                    50
                );

                // Create transform: X-axis = Output (q), Y-axis = Total Cost (C)
                const transform = CanvasUtils.createTransform(
                    margins, width, height,
                    visualConfig.maxQ,
                    visualConfig.maxC
                );

                // Draw coordinate system
                const gridConfig = {
                    xPoints: visualConfig.gridPoints.x,
                    yPoints: visualConfig.gridPoints.y
                };

                CanvasUtils.drawGrid(ctx, margins, width, height, transform, gridConfig);
                CanvasUtils.drawAxes(ctx, margins, width, height, 'Output (q)', 'Total Cost (TC)');
                CanvasUtils.drawTicks(ctx, margins, width, height, transform, gridConfig);

                CanvasUtils.setupClipping(ctx, margins, width, height);

                // Draw the cost expansion path curve
                // Convert from {output, totalCost} to {x, y} format
                const curveData = costCurve.map(point => ({
                    x: point.output,
                    y: point.totalCost
                }));

                CanvasUtils.drawCurve(ctx, curveData, transform, {
                    color: '#7c3aed',
                    lineWidth: 3
                });

                CanvasUtils.restoreClipping(ctx);

                // Highlight current equilibrium point (current output, total cost)
                const currentOutput = params.targetOutput;
                const currentCost = optimizationAnalysis.totalCost;

                CanvasUtils.highlightPoint(ctx, currentOutput, currentCost, transform, {
                    outerColor: '#dc2626',
                    innerColor: '#ffffff'
                });

                // Add label for current point
                const pointLabel = `q=${currentOutput.toFixed(1)}, C*=${currentCost.toFixed(1)}`;
                CanvasUtils.addLabel(ctx, pointLabel, currentOutput, currentCost, transform, {
                    color: '#dc2626',
                    fontWeight: 'bold',
                    offsetX: 10,
                    offsetY: 10,
                    fontSize: 14
                });

            }, [params, selectedProductionFunction, optimizationAnalysis]);

            // Render parameter controls
            const renderSlider = (key, paramConfig) => {
                return React.createElement('div', { key: key, className: 'space-y-1' },
                    React.createElement('label', { className: 'block text-sm font-medium text-gray-600 mb-1' },
                        paramConfig.label
                    ),
                    React.createElement('div', { className: 'flex items-center space-x-3' },
                        React.createElement('input', {
                            type: 'range',
                            min: paramConfig.min,
                            max: paramConfig.max,
                            step: paramConfig.step,
                            value: params[key] || paramConfig.default,
                            onChange: (e) => updateParam(key, parseFloat(e.target.value)),
                            className: 'slider flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer'
                        }),
                        React.createElement('span', { className: 'text-sm font-mono text-gray-600 w-12 text-right' },
                            (params[key] || paramConfig.default).toFixed(paramConfig.precision)
                        )
                    )
                );
            };

            // MathJax rendering effect
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax typeset failed:', err));
                }
            }, [selectedProductionFunction]);

            // Helper function to render cost equation display
            const renderCostDisplay = () => {
                const w = (params.wageRate ?? 2.0).toFixed(1);
                const r = (params.rentalRate ?? 3.0).toFixed(1);

                const generalFormLatex = `$TC=wL + rK$`;
                const specificFormLatex = `Isocost line: ${w}L + ${r}K = C`;

                return React.createElement('div', {
                    key: 'cost-equation',
                    className: "text-center"
                }, [
                    React.createElement('div', {
                        key: 'general-form',
                        className: "mb-1"
                    }, generalFormLatex),
                    React.createElement('div', {
                        key: 'specific-form',
                        className: "text-sm text-red-600"
                    }, specificFormLatex)
                ]);
            };

            // Helper function to render production function equation display
            const renderEquationDisplay = () => {
                const funcConfig = CostConfig.productionFunctions[selectedProductionFunction];
                if (!funcConfig) return '';

                let generalFormLatex = funcConfig.mathForm;
                let currentValuesLatex = '';

                const targetOutput = (params.targetOutput ?? 10).toFixed(0);

                // Add specific form with actual parameter values (as isoquant equation)
                switch(selectedProductionFunction) {
                    case 'cobb-douglas':
                        const A = (params.cd_A ?? 1).toFixed(2);
                        const alpha = (params.cd_alpha ?? 0.6).toFixed(2);
                        const beta = (params.cd_beta ?? 0.4).toFixed(2);
                        currentValuesLatex = `Target isoquant: ${A}L<sup>${alpha}</sup>K<sup>${beta}</sup> = ${targetOutput}`;
                        break;
                    case 'ces':
                        const a = (params.ces_a ?? 0.5).toFixed(2);
                        const sigma = (params.ces_sigma ?? 1.5).toFixed(2);
                        const nu = (params.ces_nu ?? 1.0).toFixed(2);
                        const b = (1 - (params.ces_a ?? 0.5)).toFixed(2);
                        const rho = ((sigma-1)/sigma).toFixed(2);
                        const outerExp = (nu / ((sigma-1)/sigma)).toFixed(2);
                        currentValuesLatex = `Target isoquant: (${a}L<sup>${rho}</sup> + ${b}K<sup>${rho}</sup>)<sup>${outerExp}</sup> = ${targetOutput}`;
                        break;
                    case 'linear':
                        const lin_a = (params.lin_a ?? 1).toFixed(2);
                        const lin_b = (params.lin_b ?? 1.2).toFixed(2);
                        currentValuesLatex = `Target isoquant: ${lin_a}L + ${lin_b}K = ${targetOutput}`;
                        break;
                    case 'fixed-proportions':
                        const fp_A = (params.fp_A ?? 1).toFixed(2);
                        const fp_a = (params.fp_a ?? 0.5).toFixed(2);
                        const fp_b = (params.fp_b ?? 0.8).toFixed(2);
                        currentValuesLatex = `Target isoquant: ${fp_A} min(${fp_a}L, ${fp_b}K) = ${targetOutput}`;
                        break;
                }

                const generalLatex = `$f(K,L)=${generalFormLatex}$`;
                const specificLatex = currentValuesLatex;

                return React.createElement('div', {
                    key: 'math-equation',
                    className: "text-center"
                }, [
                    React.createElement('div', {
                        key: 'general-form',
                        className: "mb-1"
                    }, generalLatex),
                    React.createElement('div', {
                        key: 'specific-form',
                        className: "text-sm text-blue-600",
                        dangerouslySetInnerHTML: { __html: specificLatex }
                    })
                ]);
            };

            // Main render
            return React.createElement('div', { className: 'min-h-screen p-6' },
                // Header
                React.createElement('div', { className: 'text-center mb-4' },
                    React.createElement('h1', { className: 'text-3xl font-bold text-gray-800 mb-2' },
                        'Cost Minimization Problem'
                    )
                ),

                // Main content - three column layout
                React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-3 gap-3 max-w-7xl mx-auto' },

                    // Left column: Controls
                    React.createElement('div', { className: 'space-y-3' },

                        // Production function selector
                        React.createElement('div', { className: 'bg-white rounded-lg shadow-sm border p-4' },
                            React.createElement('h2', { className: 'text-lg font-semibold text-gray-800 mb-4' },
                                'Production Function'
                            ),
                            React.createElement('select', {
                                value: selectedProductionFunction,
                                onChange: (e) => {
                                    setSelectedProductionFunction(e.target.value);
                                    // Reset production params when changing function
                                    const prodDefaults = {};
                                    const prodFunction = CostConfig.productionFunctions[e.target.value];
                                    const prodParams = prodFunction.config.productionParams;
                                    Object.keys(prodParams).forEach(key => {
                                        prodDefaults[key] = prodParams[key].default;
                                    });
                                    setParams(prev => ({ ...prev, ...prodDefaults }));
                                },
                                className: 'w-full p-2 border border-gray-300 rounded-md'
                            },
                                Object.entries(CostConfig.productionFunctions).map(([key, config]) =>
                                    React.createElement('option', { key: key, value: key }, config.name)
                                )
                            )
                        ),

                        // Cost parameters
                        React.createElement('div', { className: 'bg-white rounded-lg shadow-sm border p-4' },
                            React.createElement('div', { className: 'flex justify-between items-center mb-2' },
                                React.createElement('h2', { className: 'text-lg font-semibold text-gray-800' },
                                    'Cost Parameters'
                                ),
                                React.createElement('button', {
                                    onClick: resetCostParams,
                                    className: 'text-sm px-2 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors'
                                }, 'Reset')
                            ),
                            React.createElement('div', {
                                key: 'cost-display',
                                className: 'text-center mb-2 p-2 bg-gray-50 rounded'
                            }, renderCostDisplay()),
                            React.createElement('div', { className: 'space-y-3' },
                                Object.entries(CostConfig.costParams).map(([key, config]) =>
                                    renderSlider(key, config)
                                )
                            )
                        ),

                        // Production function parameters
                        React.createElement('div', { className: 'bg-white rounded-lg shadow-sm border p-4' },
                            React.createElement('div', { className: 'flex justify-between items-center mb-2' },
                                React.createElement('h2', { className: 'text-lg font-semibold text-gray-800' },
                                    'Production Parameters'
                                ),
                                React.createElement('button', {
                                    onClick: resetProductionParams,
                                    className: 'text-sm px-2 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors'
                                }, 'Reset')
                            ),
                            React.createElement('div', {
                                key: 'equation-display',
                                className: 'text-center mb-2 p-2 bg-gray-50 rounded'
                            }, renderEquationDisplay()),
                            React.createElement('div', { className: 'space-y-3' },
                                Object.entries(
                                    CostConfig.productionFunctions[selectedProductionFunction].config.productionParams
                                ).map(([key, config]) =>
                                    renderSlider(key, config)
                                )
                            )
                        )
                    ),

                    // Center column: Main visualization and results
                    React.createElement('div', { className: 'space-y-3' },
                        // Main visualization
                        React.createElement('div', { className: 'bg-white rounded-lg shadow-sm border p-4' },
                            React.createElement('h2', { className: 'text-lg font-semibold text-gray-800 mb-4' },
                                'Cost-Minimizing Input Mix'
                            ),
                            React.createElement('canvas', {
                                ref: mainCanvasRef,
                                className: 'w-full'
                            }),
                            // Legend below canvas
                            React.createElement('div', {
                                className: 'grid grid-cols-2 gap-x-4 gap-y-1.5 mt-3 text-xs text-gray-600'
                            }, [
                                React.createElement('div', {
                                    key: 'background-isoquants-legend',
                                    className: 'flex items-center gap-2'
                                }, [
                                    React.createElement('div', {
                                        key: 'bg-isoquants-color',
                                        className: 'w-4 h-0.5 bg-blue-300'
                                    }),
                                    React.createElement('span', {
                                        key: 'bg-isoquants-label'
                                    }, 'Background Isoquants')
                                ]),
                                React.createElement('div', {
                                    key: 'target-isoquant-legend',
                                    className: 'flex items-center gap-2'
                                }, [
                                    React.createElement('div', {
                                        key: 'target-isoquant-color',
                                        className: 'w-4 h-0.5 bg-blue-800'
                                    }),
                                    React.createElement('span', {
                                        key: 'target-isoquant-label'
                                    }, `Target Isoquant (q=${params.targetOutput})`)
                                ]),
                                React.createElement('div', {
                                    key: 'optimal-isocost-legend',
                                    className: 'flex items-center gap-2'
                                }, [
                                    React.createElement('div', {
                                        key: 'optimal-isocost-color',
                                        className: 'w-4 h-0.5 bg-emerald-600'
                                    }),
                                    React.createElement('span', {
                                        key: 'optimal-isocost-label'
                                    }, `Optimal Isocost (C*=${optimizationAnalysis.totalCost.toFixed(1)})`)
                                ]),
                                React.createElement('div', {
                                    key: 'optimal-bundle-legend',
                                    className: 'flex items-center gap-2'
                                }, [
                                    React.createElement('div', {
                                        key: 'optimal-bundle-color',
                                        className: 'w-2 h-2 bg-red-600 rounded-full'
                                    }),
                                    React.createElement('span', {
                                        key: 'optimal-bundle-label'
                                    }, 'Optimal Input Mix')
                                ])
                            ])
                        ),

                        // Optimization Results
                        React.createElement('div', {
                            key: 'results-summary',
                            className: 'bg-white p-4 rounded-lg shadow-sm border'
                        }, [
                            React.createElement('h3', {
                                key: 'results-title',
                                className: 'text-lg font-semibold text-gray-700 mb-4'
                            }, 'Optimization Results'),

                            // Cost Minimization Problem Statement
                            React.createElement('div', {
                                key: 'cmp-problem-statement',
                                className: 'bg-gray-50 p-3 rounded-lg border mb-3'
                            }, [
                                React.createElement('div', {
                                    key: 'cmp-content',
                                    className: 'text-sm text-gray-700'
                                }, [
                                    React.createElement('div', { key: 'cmp-explanation' }, [
                                        React.createElement('strong', { key: 'cmp-title' }, 'Cost Minimization Problem:'),
                                        React.createElement('div', {
                                            key: 'cmp-math',
                                            className: 'my-2'
                                        }, `Minimize total cost $TC=wL + rK$ of producing target output $q$ by choosing an optimal mix of inputs $K$ and $L$, subject to technology constraint $f(L,K) \\geq q$`)
                                    ])
                                ])
                            ]),

                            optimizationAnalysis ? React.createElement('div', {
                                key: 'results-content',
                                className: 'grid grid-cols-2 gap-4 text-sm'
                            }, [
                                React.createElement('div', {
                                    key: 'optimal-inputs',
                                    className: 'space-y-2'
                                }, [
                                    React.createElement('h4', {
                                        key: 'inputs-title',
                                        className: 'font-bold text-gray-600'
                                    }, 'Optimal Input Mix'),
                                    React.createElement('div', { key: 'LK-values' }, `L* = ${optimizationAnalysis.optimalBundle.L.toFixed(2)}, K* = ${optimizationAnalysis.optimalBundle.K.toFixed(2)}`)
                                ]),

                                React.createElement('div', {
                                    key: 'minimum-cost',
                                    className: 'space-y-2'
                                }, [
                                    React.createElement('h4', {
                                        key: 'cost-title',
                                        className: 'font-bold text-gray-600'
                                    }, 'Minimum Cost'),
                                    React.createElement('div', { key: 'cost-value' }, `C* = ${optimizationAnalysis.totalCost.toFixed(2)}`)
                                ])
                            ]) : React.createElement('div', {
                                key: 'loading',
                                className: 'text-gray-500'
                            }, 'Loading optimization results...')
                        ])
                    ),

                    // Right column: Supporting visualizations
                    React.createElement('div', { className: 'space-y-3' },

                        // Conditional demand (labor or capital)
                        React.createElement('div', { className: 'bg-white rounded-lg shadow-sm border p-4' },
                            React.createElement('div', { className: 'flex justify-between items-center mb-4' },
                                React.createElement('h2', { className: 'text-lg font-semibold text-gray-800' },
                                    'Conditional Demand'
                                ),
                                React.createElement('div', { className: 'flex gap-2' },
                                    React.createElement('button', {
                                        onClick: () => setDemandType('labor'),
                                        className: `px-3 py-1 text-sm rounded transition-colors ${
                                            demandType === 'labor'
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                        }`
                                    }, 'Labor'),
                                    React.createElement('button', {
                                        onClick: () => setDemandType('capital'),
                                        className: `px-3 py-1 text-sm rounded transition-colors ${
                                            demandType === 'capital'
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                        }`
                                    }, 'Capital')
                                )
                            ),
                            React.createElement('canvas', {
                                ref: demandCanvasRef,
                                className: 'w-full'
                            })
                        ),

                        // Cost expansion path
                        React.createElement('div', { className: 'bg-white rounded-lg shadow-sm border p-4' },
                            React.createElement('h2', { className: 'text-lg font-semibold text-gray-800 mb-4' },
                                'Total Cost Curve'
                            ),
                            React.createElement('canvas', {
                                ref: costExpansionCanvasRef,
                                className: 'w-full'
                            })
                        )
                    )
                ),

                // Educational Content Section - Understanding Cost Minimization
                React.createElement('div', {
                    key: 'educational-notes',
                    className: 'bg-white p-6 rounded-lg shadow-sm border max-w-7xl mx-auto mt-6'
                }, [
                    React.createElement('h3', {
                        key: 'education-title',
                        className: 'text-xl font-semibold text-gray-800 mb-4'
                    }, 'Understanding the Visualizations'),

                    React.createElement('div', {
                        key: 'education-grid',
                        className: 'grid grid-cols-1 md:grid-cols-3 gap-6 text-sm'
                    }, [
                        React.createElement('div', { key: 'main-viz-explanation' }, [
                            React.createElement('h4', {
                                key: 'main-viz-title',
                                className: 'font-semibold text-gray-700 mb-3 text-base'
                            }, 'Cost-Minimizing Input Mix'),
                            React.createElement('ul', {
                                key: 'main-viz-list',
                                className: 'text-gray-600 space-y-1'
                            }, [
                                React.createElement('li', { key: 'main-1' }, '• Shows optimal combination of labor (L) and capital (K)'),
                                React.createElement('li', { key: 'main-2' }, '• Target isoquant (dark blue) represents required output level q'),
                                React.createElement('li', { key: 'main-3' }, '• Optimal isocost line (green) shows minimum cost to achieve q'),
                                React.createElement('li', { key: 'main-4' }, '• Red point indicates the cost-minimizing input mix')
                            ])
                        ]),
                        React.createElement('div', { key: 'conditional-demand-explanation' }, [
                            React.createElement('h4', {
                                key: 'cond-demand-title',
                                className: 'font-semibold text-gray-700 mb-3 text-base'
                            }, 'Conditional Demands'),
                            React.createElement('ul', {
                                key: 'cond-demand-list',
                                className: 'text-gray-600 space-y-1'
                            }, [
                                React.createElement('li', { key: 'cond-1' }, '• Show how optimal input usage responds to factor price changes, conditional on target output q'),
                                React.createElement('li', { key: 'cond-4' }, '• Illustrates pure substitution effects between inputs')
                            ])
                        ]),
                        React.createElement('div', { key: 'total-cost-explanation' }, [
                            React.createElement('h4', {
                                key: 'total-cost-title',
                                className: 'font-semibold text-gray-700 mb-3 text-base'
                            }, 'Total Cost Curve'),
                            React.createElement('ul', {
                                key: 'total-cost-list',
                                className: 'text-gray-600 space-y-1'
                            }, [
                                React.createElement('li', { key: 'cost-1' }, '• Shows minimum cost C*(q) for each output level'),
                                React.createElement('li', { key: 'cost-2' }, '• Its shape is affected by returns to scale'),
                                React.createElement('li', { key: 'cost-4' }, '• Basis for deriving marginal and average cost curves')
                            ])
                        ])
                    ])
                ])
            );
        };

        // Mount the React component
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(CostVisualization));
    </script>
