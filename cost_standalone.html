    <script>
        // Embedded Module: costMath.js
        // Cost Minimization Mathematics for Cost Minimization Interactive Visualization App
        // Contains all mathematical functions for cost minimization and production theory analysis
        
        const CostMath = {
        
          // Production function definitions with pure mathematical operations
          productionFunctions: {
            'cobb-douglas': {
              // Production function: q = AL^α K^β
              production: (L, K, config) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                return cd_A * Math.pow(safeL, cd_alpha) * Math.pow(safeK, cd_beta);
              },
        
              // Marginal product of labor: MPₗ = ∂q/∂L = αAL^(α-1)K^β
              marginalL: (L, K, config) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                return cd_A * cd_alpha * Math.pow(safeL, cd_alpha - 1) * Math.pow(safeK, cd_beta);
              },
        
              // Marginal product of capital: MPₖ = ∂q/∂K = βAL^α K^(β-1)
              marginalK: (L, K, config) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                return cd_A * cd_beta * Math.pow(safeL, cd_alpha) * Math.pow(safeK, cd_beta - 1);
              },
        
              // Marginal rate of technical substitution: MRTS = -MPₗ/MPₖ = -αK/(βL)
              mrts: (L, K, config) => {
                const { cd_alpha, cd_beta } = config;
                const safeL = Math.max(0.001, L);
                return -(cd_alpha * K) / (cd_beta * safeL);
              },
        
              // Generate isoquant curve for given output level with adaptive spacing
              generateIsoquant: (targetOutput, config, maxL = 30, maxK = 30, points = 100) => {
                const { cd_A, cd_alpha, cd_beta } = config;
                const curve = [];
        
                // Adaptive minimum L calculation: work backwards from maxK
                // From q = AL^α K^β, solve for L when K = maxK: L = (q/(A*maxK^β))^(1/α)
                const LMin = Math.max(0.001, Math.pow(targetOutput / (cd_A * Math.pow(maxK, cd_beta)), 1 / cd_alpha));
        
                for (let i = 0; i <= points; i++) {
                  const t = i / points; // t from 0 to 1
                  // Logarithmic spacing: more points near LMin where curve is steepest
                  const L = LMin + (maxL - LMin) * (Math.exp(t * Math.log(10)) - 1) / 9;
        
                  // From q = AL^α K^β, solve for K: K = (q/(AL^α))^(1/β)
                  const K = Math.pow(targetOutput / (cd_A * Math.pow(L, cd_alpha)), 1 / cd_beta);
        
                  // Remove bound checking - rely on canvas clipping instead
                  if (K > 0 && isFinite(K)) {
                    curve.push({ L, K });
                  }
                }
        
                return curve;
              },
        
              // Calculate min and max possible output given parameter ranges
              getQuantityRange: (paramRanges, maxL, maxK) => {
                // Min: smallest A, α, β at smallest L, K
                const minQ = paramRanges.cd_A.min * Math.pow(0.1, paramRanges.cd_alpha.min) * Math.pow(0.1, paramRanges.cd_beta.min);
                // Max: largest A, α, β at largest L, K
                const maxQ = paramRanges.cd_A.max * Math.pow(maxL, paramRanges.cd_alpha.max) * Math.pow(maxK, paramRanges.cd_beta.max);
                return { minQ, maxQ };
              }
            },
        
            'ces': {
              // CES Production function: q = (aL^ρ + (1-a)K^ρ)^(ν/ρ) where ρ = (σ-1)/σ
              production: (L, K, config) => {
                const { ces_a, ces_sigma, ces_nu } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                const nu = ces_nu ?? 1.0; // Default to 1 if not specified
        
                const rho = (ces_sigma - 1) / ces_sigma;
                const EPS = 1e-6;
        
                // Handle special case: ρ ≈ 0 (σ ≈ 1) → Cobb-Douglas with returns to scale
                if (Math.abs(rho) < EPS) {
                  // Use Cobb-Douglas formula with returns to scale: q = (L^a * K^(1-a))^ν
                  return Math.pow(Math.pow(safeL, ces_a) * Math.pow(safeK, 1 - ces_a), nu);
                }
        
                const term1 = ces_a * Math.pow(safeL, rho);
                const term2 = (1 - ces_a) * Math.pow(safeK, rho);
        
                return Math.pow(term1 + term2, nu / rho);
              },
        
              // Marginal product of labor for CES
              // MPₗ = ∂q/∂L = (ν/ρ) * (aL^ρ + (1-a)K^ρ)^(ν/ρ - 1) * a * ρ * L^(ρ-1)
              //     = ν * a * L^(ρ-1) * (aL^ρ + (1-a)K^ρ)^(ν/ρ - 1)
              marginalL: (L, K, config) => {
                const { ces_a, ces_sigma, ces_nu } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                const nu = ces_nu ?? 1.0;
        
                const rho = (ces_sigma - 1) / ces_sigma;
                const EPS = 1e-6;
        
                // Handle special case: ρ ≈ 0 (σ ≈ 1) → Cobb-Douglas marginal L with returns to scale
                if (Math.abs(rho) < EPS) {
                  // Cobb-Douglas marginal L with returns to scale: MPₗ = ν * a * L^(a-1) * K^(1-a) * (L^a * K^(1-a))^(ν-1)
                  const base = Math.pow(safeL, ces_a) * Math.pow(safeK, 1 - ces_a);
                  return nu * ces_a * Math.pow(safeL, ces_a - 1) * Math.pow(safeK, 1 - ces_a) * Math.pow(base, nu - 1);
                }
        
                const term1 = ces_a * Math.pow(safeL, rho);
                const term2 = (1 - ces_a) * Math.pow(safeK, rho);
                const totalTerm = Math.pow(term1 + term2, nu / rho - 1);
        
                return nu * ces_a * Math.pow(safeL, rho - 1) * totalTerm;
              },
        
              // Marginal product of capital for CES
              // MPₖ = ∂q/∂K = ν * (1-a) * K^(ρ-1) * (aL^ρ + (1-a)K^ρ)^(ν/ρ - 1)
              marginalK: (L, K, config) => {
                const { ces_a, ces_sigma, ces_nu } = config;
                const safeL = Math.max(0.001, L);
                const safeK = Math.max(0.001, K);
                const nu = ces_nu ?? 1.0;
        
                const rho = (ces_sigma - 1) / ces_sigma;
                const EPS = 1e-6;
        
                // Handle special case: ρ ≈ 0 (σ ≈ 1) → Cobb-Douglas marginal K with returns to scale
                if (Math.abs(rho) < EPS) {
                  // Cobb-Douglas marginal K with returns to scale: MPₖ = ν * (1-a) * L^a * K^(-a) * (L^a * K^(1-a))^(ν-1)
                  const base = Math.pow(safeL, ces_a) * Math.pow(safeK, 1 - ces_a);
                  return nu * (1 - ces_a) * Math.pow(safeL, ces_a) * Math.pow(safeK, -ces_a) * Math.pow(base, nu - 1);
                }
        
                const term1 = ces_a * Math.pow(safeL, rho);
                const term2 = (1 - ces_a) * Math.pow(safeK, rho);
                const totalTerm = Math.pow(term1 + term2, nu / rho - 1);
        
                return nu * (1 - ces_a) * Math.pow(safeK, rho - 1) * totalTerm;
              },
        
              // MRTS for CES: MRTS = -(a/(1-a))(K/L)^(1/σ)
              mrts: (L, K, config) => {
                const { ces_a, ces_sigma } = config;
                const safeL = Math.max(0.001, L);
                return -(ces_a / (1 - ces_a)) * Math.pow(K / safeL, 1 / ces_sigma);
              },
        
              // Generate isoquant curve for CES function with adaptive spacing
              generateIsoquant: (targetOutput, config, maxL = 30, maxK = 30, points = 100) => {
                const { ces_a, ces_sigma, ces_nu } = config;
                const curve = [];
                const EPS = 1e-6;
                const nu = ces_nu ?? 1.0;
        
                // Convert sigma to rho for internal calculations
                const rho = (ces_sigma - 1) / ces_sigma;
        
                // Handle special cases
                if (Math.abs(rho) < EPS) {
                  // ρ ≈ 0: Cobb-Douglas case with returns to scale
                  // For q = (L^a * K^(1-a))^ν = targetOutput, we need L^a * K^(1-a) = targetOutput^(1/ν)
                  const adjustedOutput = Math.pow(targetOutput, 1 / nu);
                  return CostMath.productionFunctions['cobb-douglas'].generateIsoquant(
                    adjustedOutput,
                    { cd_A: 1, cd_alpha: ces_a, cd_beta: 1 - ces_a },
                    maxL,
                    maxK,
                    points
                  );
                } else if (Math.abs(rho - 1) < EPS) {
                  // ρ ≈ 1: Perfect substitutes case with returns to scale
                  // For q = (aL + (1-a)K)^ν = targetOutput, we need aL + (1-a)K = targetOutput^(1/ν)
                  const adjustedOutput = Math.pow(targetOutput, 1 / nu);
                  return CostMath.productionFunctions['linear'].generateIsoquant(
                    adjustedOutput,
                    { lin_a: ces_a, lin_b: 1 - ces_a },
                    maxL,
                    points
                  );
                } else {
                  // General CES case: analytical solution
                  // From q = (aL^ρ + (1-a)K^ρ)^(ν/ρ)
                  // Solve for K: aL^ρ + (1-a)K^ρ = q^(ρ/ν)
                  // K = ((q^(ρ/ν) - aL^ρ)/(1-a))^(1/ρ)
        
                  // Find minimum valid L by working backwards from K = maxK
                  const KLimit = maxK;
                  const qPowered = Math.pow(targetOutput, rho / nu);
                  const term = (qPowered - (1 - ces_a) * Math.pow(KLimit, rho)) / ces_a;
                  const LMin = Math.max(0.001, term > 0 ? Math.pow(term, 1 / rho) : 0.001);
        
                  // Add boundary point explicitly to avoid numerical precision errors with extreme exponents
                  // When ρ is very negative (low σ), recalculating K from LMin causes floating-point errors
                  if (LMin < maxL && term > 0) {
                    curve.push({ L: LMin, K: maxK });
                  }
        
                  for (let i = 1; i <= points; i++) {  // Start from i=1 to skip LMin recalculation
                    const t = i / points;  // t from 0 to 1
                    // Logarithmic spacing: more points near LMin where curve is steepest
                    const L = LMin + (maxL - LMin) * (Math.exp(t * Math.log(10)) - 1) / 9;
                    if (L <= 0.001) continue;
        
                    // Analytical solution with returns to scale
                    const termCalc = (qPowered - ces_a * Math.pow(L, rho)) / (1 - ces_a);
                    if (termCalc > 0) {
                      const K = Math.pow(termCalc, 1 / rho);
                      if (K > 0 && isFinite(K)) {
                        curve.push({ L, K });
                      }
                    }
                  }
                }
        
                return curve;
              },
        
              // Calculate min and max possible output given parameter ranges
              getQuantityRange: (paramRanges, maxL, maxK) => {
                // Min: smallest parameters at smallest L, K
                const minRho = (paramRanges.ces_sigma.min - 1) / paramRanges.ces_sigma.min;
                const minNu = paramRanges.ces_nu.min;
                const minA = paramRanges.ces_a.min;
                const minTerm = minA * Math.pow(0.1, minRho) + (1 - minA) * Math.pow(0.1, minRho);
                const minQ = Math.pow(minTerm, minNu / minRho);
        
                // Max: largest parameters at largest L, K
                const maxRho = (paramRanges.ces_sigma.max - 1) / paramRanges.ces_sigma.max;
                const maxNu = paramRanges.ces_nu.max;
                const maxA = paramRanges.ces_a.max;
                const maxTerm = maxA * Math.pow(maxL, maxRho) + (1 - maxA) * Math.pow(maxK, maxRho);
                const maxQ = Math.pow(maxTerm, maxNu / maxRho);
        
                return { minQ, maxQ };
              }
            },
        
            'linear': {
              // Linear production function: q = aL + bK
              production: (L, K, config) => {
                const { lin_a, lin_b } = config;
                return lin_a * L + lin_b * K;
              },
        
              // Marginal product of labor: MPₗ = a (constant)
              marginalL: (L, K, config) => {
                const { lin_a } = config;
                return lin_a;
              },
        
              // Marginal product of capital: MPₖ = b (constant)
              marginalK: (L, K, config) => {
                const { lin_b } = config;
                return lin_b;
              },
        
              // MRTS for linear: MRTS = -a/b (constant)
              mrts: (L, K, config) => {
                const { lin_a, lin_b } = config;
                return -lin_a / lin_b;
              },
        
              // Generate isoquant curve (straight line) for linear function
              generateIsoquant: (targetOutput, config, maxL = 30, points = 100) => {
                const { lin_a, lin_b } = config;
                const curve = [];
        
                // For q = aL + bK, isoquant is: K = (q - aL)/b
                for (let i = 0; i <= points; i++) {
                  const L = (i / points) * maxL;
                  const K = (targetOutput - lin_a * L) / lin_b;
        
                  // Remove bound checking - rely on canvas clipping instead
                  // Linear functions are straight lines, so no need for adaptive spacing
                  if (isFinite(K)) {
                    curve.push({ L, K });
                  }
                }
        
                return curve;
              },
        
              // Calculate min and max possible output given parameter ranges
              getQuantityRange: (paramRanges, maxL, maxK) => {
                // Min: smallest a, b at smallest L, K
                const minQ = paramRanges.lin_a.min * 0.1 + paramRanges.lin_b.min * 0.1;
                // Max: largest a, b at largest L, K
                const maxQ = paramRanges.lin_a.max * maxL + paramRanges.lin_b.max * maxK;
                return { minQ, maxQ };
              }
            },
        
            'fixed-proportions': {
              // Fixed-proportions production function: q = A * min{aL, bK}
              production: (L, K, config) => {
                const { fp_A, fp_a, fp_b } = config;
                return fp_A * Math.min(fp_a * L, fp_b * K);
              },
        
              // Marginal product of labor: MPₗ = A*a if aL < bK, 0 otherwise
              marginalL: (L, K, config) => {
                const { fp_A, fp_a, fp_b } = config;
                return (fp_a * L < fp_b * K) ? fp_A * fp_a : 0;
              },
        
              // Marginal product of capital: MPₖ = A*b if bK < aL, 0 otherwise
              marginalK: (L, K, config) => {
                const { fp_A, fp_a, fp_b } = config;
                return (fp_b * K < fp_a * L) ? fp_A * fp_b : 0;
              },
        
              // MRTS: Undefined at kink, 0 on horizontal, ∞ on vertical
              mrts: (L, K, config) => {
                const { fp_a, fp_b } = config;
                const aL = fp_a * L;
                const bK = fp_b * K;
        
                if (Math.abs(aL - bK) < 0.01) return NaN; // At the kink
                return (aL < bK) ? 0 : -Infinity;
              },
        
              // Generate L-shaped isoquant curve
              generateIsoquant: (targetOutput, config, maxL = 30, maxK = 30, points = 100) => {
                const { fp_A, fp_a, fp_b } = config;
        
                if (targetOutput <= 0 || fp_A <= 0) {
                  return {
                    points: [],
                    curveType: 'L-shaped',
                    metadata: {
                      outputLevel: targetOutput,
                      cornerL: 0,
                      cornerK: 0,
                      maxL: maxL,
                      maxK: maxK
                    }
                  };
                }
        
                // Corner point where aL = bK and q = A*aL = A*bK
                const cornerL = targetOutput / (fp_A * fp_a);
                const cornerK = targetOutput / (fp_A * fp_b);
        
                return {
                  points: [], // Empty - L-shapes handled by drawLShape method
                  curveType: 'L-shaped',
                  metadata: {
                    outputLevel: targetOutput,
                    cornerL: Math.max(0.001, cornerL),
                    cornerK: Math.max(0.001, cornerK),
                    maxL: maxL,
                    maxK: maxK
                  }
                };
              },
        
              // Calculate min and max possible output given parameter ranges
              getQuantityRange: (paramRanges, maxL, maxK) => {
                // Min: smallest A, a, b at smallest inputs
                const minQ = paramRanges.fp_A.min * Math.min(paramRanges.fp_a.min * 0.1, paramRanges.fp_b.min * 0.1);
                // Max: largest A, a, b at largest inputs
                const maxQ = paramRanges.fp_A.max * Math.min(paramRanges.fp_a.max * maxL, paramRanges.fp_b.max * maxK);
                return { minQ, maxQ };
              }
            }
          },
        
          // Create 3D production surface from production function parameters
          create3DProductionSurface: (functionType, config, bounds = {}, resolution = 40) => {
            const { maxL = 30, maxK = 30, maxQ = 60 } = bounds;
            const productionFn = CostMath.productionFunctions[functionType].production;
            const vertices = [];
            const faces = [];
        
            // Generate vertices with production math
            for (let i = 0; i <= resolution; i++) {
              for (let j = 0; j <= resolution; j++) {
                const L = (i / resolution) * maxL;
                const K = (j / resolution) * maxK;
                const q = productionFn(L, K, config);
        
                // Map production coordinates to generic 3D coordinates
                // Capital on X-axis, Output on Y-axis, Labor on Z-axis
                vertices.push({ x: K, y: q, z: L });
              }
            }
        
            // Generate faces (triangles for mesh)
            for (let i = 0; i < resolution; i++) {
              for (let j = 0; j < resolution; j++) {
                const idx = i * (resolution + 1) + j;
        
                // Two triangles per square
                faces.push([idx, idx + 1, idx + resolution + 1]);
                faces.push([idx + 1, idx + resolution + 2, idx + resolution + 1]);
              }
            }
        
            const surfaceData = { vertices, faces };
        
            // Call generic canvasUtils function
            return CanvasUtils.create3DSurface(surfaceData, resolution);
          },
        
        
          // Generate total product curves for 2D analysis
          generateTotalProductCurve: (functionType, config, inputType = 'L', fixedLevel = 10, maxInput = 30, points = 100) => {
            const productionFn = CostMath.productionFunctions[functionType];
        
            const curve = [];
        
            for (let i = 0; i <= points; i++) {
              const input = (i / points) * maxInput + 0.1;
              const L = inputType === 'L' ? input : fixedLevel;
              const K = inputType === 'K' ? input : fixedLevel;
        
              const totalProduct = productionFn.production(L, K, config);
        
              curve.push({
                input,
                output: totalProduct,
                L,
                K
              });
            }
        
            return curve;
          },
        
        
          // ========================================================================
          // Cost Minimization Problem (CMP) Solvers - To be implemented in Phase 2
          // ========================================================================
        
          // Solve cost minimization problem for each production function
          // Returns: { L, K, totalCost, mrts, isCornerSolution }
          solveCMP: (targetOutput, wageRate, rentalRate, functionType, config) => {
            if (targetOutput <= 0 || wageRate <= 0 || rentalRate <= 0) {
              return { L: 0.001, K: 0.001, totalCost: 0, mrts: NaN, isCornerSolution: false };
            }
        
            // Route to appropriate solver based on production function type
            switch (functionType) {
              case 'cobb-douglas':
                return CostMath.solveCMP_CobbDouglas(targetOutput, wageRate, rentalRate, config);
              case 'ces':
                return CostMath.solveCMP_CES(targetOutput, wageRate, rentalRate, config);
              case 'linear':
                return CostMath.solveCMP_Linear(targetOutput, wageRate, rentalRate, config);
              case 'fixed-proportions':
                return CostMath.solveCMP_FixedProportions(targetOutput, wageRate, rentalRate, config);
              default:
                return { L: 0.001, K: 0.001, totalCost: 0, mrts: NaN, isCornerSolution: false };
            }
          },
        
          // Cobb-Douglas CMP: q̄ = AL^α K^β, minimize wL + rK
          solveCMP_CobbDouglas: (targetOutput, wageRate, rentalRate, config) => {
            const { cd_A, cd_alpha, cd_beta } = config;
        
            // Tangency condition: MRTS = w/r → (α/β)(K/L) = w/r → K = (βw/αr)L
            // Substituting into constraint: q̄ = AL^α [(βw/αr)L]^β
            // Solving: L* = [q̄/(A(βw/αr)^β)]^(1/(α+β))
        
            const factorRatio = (cd_beta * wageRate) / (cd_alpha * rentalRate);
            const denominator = cd_A * Math.pow(factorRatio, cd_beta);
            const exponent = 1 / (cd_alpha + cd_beta);
        
            const L = Math.pow(targetOutput / denominator, exponent);
            const K = factorRatio * L;
            const totalCost = wageRate * L + rentalRate * K;
        
            // Calculate MRTS at optimal point
            const mrts = CostMath.productionFunctions['cobb-douglas'].mrts(L, K, config);
        
            return { L, K, totalCost, mrts, isCornerSolution: false };
          },
        
          // CES CMP: q̄ = (aL^ρ + (1-a)K^ρ)^(ν/ρ), minimize wL + rK
          solveCMP_CES: (targetOutput, wageRate, rentalRate, config) => {
            const { ces_a, ces_sigma, ces_nu } = config;
            const nu = ces_nu ?? 1.0;
            const rho = (ces_sigma - 1) / ces_sigma;
            const EPS = 1e-6;
        
            // Special case: ρ ≈ 0 (σ ≈ 1) → Cobb-Douglas with returns to scale
            if (Math.abs(rho) < EPS) {
              // Use Cobb-Douglas formula with a as labor exponent and adjusted output
              // For q = (L^a * K^(1-a))^ν, the isoquant is the same as L^a * K^(1-a) = q^(1/ν)
              const adjustedOutput = Math.pow(targetOutput, 1 / nu);
              const cd_config = { cd_A: 1, cd_alpha: ces_a, cd_beta: 1 - ces_a };
              return CostMath.solveCMP_CobbDouglas(adjustedOutput, wageRate, rentalRate, cd_config);
            }
        
            // Special case: ρ ≈ 1 (σ → ∞) → Perfect substitutes with returns to scale
            if (Math.abs(rho - 1) < EPS) {
              const adjustedOutput = Math.pow(targetOutput, 1 / nu);
              const lin_config = { lin_a: ces_a, lin_b: 1 - ces_a };
              return CostMath.solveCMP_Linear(adjustedOutput, wageRate, rentalRate, lin_config);
            }
        
            // General CES case with returns to scale:
            // FOC tangency: MRTS = -w/r, where MRTS = -(a/(1-a))(K/L)^(1/σ) and 1/σ = -(ρ-1)
            // Note: MRTS is independent of ν (returns to scale parameter)
            // So: (a/(1-a))(K/L)^(-(ρ-1)) = w/r
            // Optimal factor ratio: K/L = [(1-a)w/(ar)]^(-1/(ρ-1)) = [ar/(1-a)w]^(1/(ρ-1))
        
            const base = ((1 - ces_a) * wageRate) / (ces_a * rentalRate);
            const factorRatio = Math.pow(base, -1 / (rho - 1)); // K/L (note negative exponent)
        
            // Conditional labor demand from constraint with returns to scale:
            // From q̄ = [aL^ρ + (1-a)K^ρ]^(ν/ρ) and K/L = [(1-a)w/(ar)]^(-1/(ρ-1))
            // We get: aL^ρ + (1-a)K^ρ = q̄^(ρ/ν)
            // L^ρ [a + (1-a)(K/L)^ρ] = q̄^(ρ/ν)
            // L*(w,r,q̄) = (q̄^(ρ/ν) / [a + (1-a)(K/L)^ρ])^(1/ρ)
            const qPowered = Math.pow(targetOutput, rho / nu);
            const innerTerm = ces_a + (1 - ces_a) * Math.pow(base, -rho / (rho - 1));
            const L = Math.pow(qPowered / innerTerm, 1 / rho);
            const K = factorRatio * L;
        
            const totalCost = wageRate * L + rentalRate * K;
            const mrts = CostMath.productionFunctions['ces'].mrts(L, K, config);
        
            return { L, K, totalCost, mrts, isCornerSolution: false };
          },
        
          // Linear (Perfect Substitutes) CMP: q̄ = aL + bK, minimize wL + rK
          solveCMP_Linear: (targetOutput, wageRate, rentalRate, config) => {
            const { lin_a, lin_b } = config;
        
            // Corner solution: compare cost per unit of output for each input
            // Cost per unit using only labor: w/a
            // Cost per unit using only capital: r/b
        
            const costPerUnitLabor = wageRate / lin_a;
            const costPerUnitCapital = rentalRate / lin_b;
            const EPS = 1e-6;
        
            if (Math.abs(costPerUnitLabor - costPerUnitCapital) < EPS) {
              // Indifferent - multiple optimal solutions
              // Return a mix for visualization purposes (midpoint of line)
              const L = targetOutput / (2 * lin_a);
              const K = targetOutput / (2 * lin_b);
              const totalCost = wageRate * L + rentalRate * K;
              const mrts = -lin_a / lin_b;
              return { L, K, totalCost, mrts, isCornerSolution: false };
            }
            else if (costPerUnitLabor < costPerUnitCapital) {
              // Use only labor
              const L = targetOutput / lin_a;
              const K = 0.001; // Minimal capital
              const totalCost = wageRate * L + rentalRate * K;
              const mrts = -lin_a / lin_b;
              return { L, K, totalCost, mrts, isCornerSolution: true };
            }
            else {
              // Use only capital
              const L = 0.001; // Minimal labor
              const K = targetOutput / lin_b;
              const totalCost = wageRate * L + rentalRate * K;
              const mrts = -lin_a / lin_b;
              return { L, K, totalCost, mrts, isCornerSolution: true };
            }
          },
        
          // Fixed-proportions (Perfect Complements) CMP: q̄ = A·min{aL, bK}, minimize wL + rK
          solveCMP_FixedProportions: (targetOutput, wageRate, rentalRate, config) => {
            const { fp_A, fp_a, fp_b } = config;
        
            // At optimum: no waste, so aL = bK
            // From constraint: aL = q̄/A → L* = q̄/(Aa)
            // From optimum condition: K* = (a/b)L* = q̄/(Ab)
        
            const L = targetOutput / (fp_A * fp_a);
            const K = targetOutput / (fp_A * fp_b);
            const totalCost = wageRate * L + rentalRate * K;
        
            // MRTS is undefined at the kink
            const mrts = NaN;
        
            return { L, K, totalCost, mrts, isCornerSolution: false };
          },
        
          // Generate conditional factor demand curve for labor: L*(w|r,q̄)
          // Shows how optimal labor varies with wage, holding r and q̄ constant
          generateConditionalLaborDemand: (wageRange, rentalRate, targetOutput, functionType, config, points = 50) => {
            const { min: minWage, max: maxWage } = wageRange;
            const curve = [];
        
            for (let i = 0; i <= points; i++) {
              const wage = minWage + (i / points) * (maxWage - minWage);
        
              // Solve CMP at this wage rate
              const solution = CostMath.solveCMP(targetOutput, wage, rentalRate, functionType, config);
        
              curve.push({
                wageRate: wage,
                laborDemand: solution.L,
                capitalDemand: solution.K,
                totalCost: solution.totalCost,
                isCornerSolution: solution.isCornerSolution
              });
            }
        
            return curve;
          },
        
          // Generate conditional factor demand curve for capital: K*(r|w,q̄)
          // Shows how optimal capital varies with rental rate, holding w and q̄ constant
          generateConditionalCapitalDemand: (rentalRateRange, wageRate, targetOutput, functionType, config, points = 50) => {
            const { min: minRentalRate, max: maxRentalRate } = rentalRateRange;
            const curve = [];
        
            for (let i = 0; i <= points; i++) {
              const rentalRate = minRentalRate + (i / points) * (maxRentalRate - minRentalRate);
        
              // Solve CMP at this rental rate
              const solution = CostMath.solveCMP(targetOutput, wageRate, rentalRate, functionType, config);
        
              curve.push({
                rentalRate: rentalRate,
                capitalDemand: solution.K,
                laborDemand: solution.L,
                totalCost: solution.totalCost,
                isCornerSolution: solution.isCornerSolution
              });
            }
        
            return curve;
          },
        
          // Generate cost expansion path: C(w,r,q̄)
          // Shows total cost function - how cost increases with output requirement
          generateCostExpansionPath: (outputRange, wageRate, rentalRate, functionType, config, points = 50) => {
            const { min: minOutput, max: maxOutput } = outputRange;
            const curve = [];
        
            for (let i = 0; i <= points; i++) {
              const output = minOutput + (i / points) * (maxOutput - minOutput);
        
              // Solve CMP at this output level
              const solution = CostMath.solveCMP(output, wageRate, rentalRate, functionType, config);
        
              curve.push({
                output: output,
                totalCost: solution.totalCost,
                laborDemand: solution.L,
                capitalDemand: solution.K,
                isCornerSolution: solution.isCornerSolution
              });
            }
        
            return curve;
          },
        
          // Generate isocost line endpoints for drawing
          // For line: wL + rK = C
          getIsocostLineEndpoints: (totalCost, wageRate, rentalRate, maxL, maxK) => {
            // Returns { laborIntercept, capitalIntercept }
            const laborIntercept = totalCost / wageRate;  // When K = 0
            const capitalIntercept = totalCost / rentalRate;  // When L = 0
            return { laborIntercept, capitalIntercept };
          },
        
          // Calculate dynamic output levels for background isoquants
          // Samples points along diagonal from (0,0) to (maxL, maxK) and calculates output at each point
          calculateDynamicOutputLevels: (functionType, config, maxL, maxK, numPoints) => {
            const productionFn = CostMath.productionFunctions[functionType];
        
            if (!productionFn || !productionFn.production) {
              console.error(`Production calculation not available for ${functionType}`);
              return [];
            }
        
            const outputLevels = [];
        
            // Generate points along the ray from origin to (maxL, maxK)
            for (let i = 1; i <= numPoints; i++) {
              const t = i / (numPoints + 1); // Avoid points at (0,0) and (maxL, maxK)
              const L = t * maxL;
              const K = t * maxK;
        
              try {
                // Calculate output at this point
                const output = productionFn.production(L, K, config);
                outputLevels.push(output);
              } catch (error) {
                console.warn(`Error calculating output at (${L.toFixed(2)}, ${K.toFixed(2)}):`, error);
              }
            }
        
            // Sort output levels to ensure they are in ascending order
            return outputLevels.sort((a, b) => a - b);
          }
        
        };
        
        // Make available globally
        window.CostMath = CostMath;
    </script>
    <script>
        // Embedded Module: canvasUtils.js
        // Canvas Utilities for EMP Visualization
        // Provides drawing and coordinate transformation utilities
        
        const CanvasUtils = {
          
          // Initialize high-DPI canvas
          initCanvas: (canvas, width = 500, height = 400) => {
            const devicePixelRatio = window.devicePixelRatio || 1;
            
            canvas.width = width * devicePixelRatio;
            canvas.height = height * devicePixelRatio;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            const ctx = canvas.getContext('2d');
            ctx.scale(devicePixelRatio, devicePixelRatio);
            
            // Clear with white background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);
            
            return { ctx, width, height };
          },
        
          // Calculate responsive margins
          calculateMargins: (width, height) => {
            const minMargin = 30;
            const marginRatio = 0.08;
            
            return {
              top: Math.max(minMargin, Math.round(height * marginRatio)),
              bottom: Math.max(minMargin + 15, Math.round(height * (marginRatio + 0.03))), // Space for x-axis labels and title
              left: Math.max(minMargin + 12, Math.round(width * (marginRatio + 0.03))), // Space for y-axis labels and title
              right: Math.max(minMargin, Math.round(width * marginRatio))
            };
          },
        
          // Create coordinate transformation
          createTransform: (margins, width, height, maxX, maxY, minX = 0, minY = 0) => {
            const drawWidth = width - margins.left - margins.right;
            const drawHeight = height - margins.top - margins.bottom;
            const scaleX = drawWidth / (maxX - minX);
            const scaleY = drawHeight / (maxY - minY);
            
            return {
              toCanvas: (x, y) => ({
                x: margins.left + (x - minX) * scaleX,
                y: height - margins.bottom - (y - minY) * scaleY
              }),
              fromCanvas: (canvasX, canvasY) => ({
                x: minX + (canvasX - margins.left) / scaleX,
                y: minY + (height - margins.bottom - canvasY) / scaleY
              }),
              scaleX,
              scaleY,
              drawWidth,
              drawHeight
            };
          },
        
          // Draw coordinate axes
          drawAxes: (ctx, margins, width, height, labelX = 'Quantity X', labelY = 'Quantity Y') => {
            ctx.strokeStyle = '#374151';
            ctx.lineWidth = 2;
            
            // X-axis
            ctx.beginPath();
            ctx.moveTo(margins.left, height - margins.bottom);
            ctx.lineTo(width - margins.right, height - margins.bottom);
            ctx.stroke();
            
            // Y-axis  
            ctx.beginPath();
            ctx.moveTo(margins.left, height - margins.bottom);
            ctx.lineTo(margins.left, margins.top);
            ctx.stroke();
            
            // Axis labels
            const fontSize = Math.max(12, Math.round(width * 0.024));
            ctx.fillStyle = '#374151';
            ctx.font = `${fontSize}px sans-serif`;
            
            // X-axis label
            ctx.textAlign = 'center';
            ctx.fillText(labelX, width / 2, height - 10);
            
            // Y-axis label (rotated)
            ctx.save();
            ctx.translate(15, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.fillText(labelY, 0, 0);
            ctx.restore();
            
            return fontSize;
          },
        
        
          // Draw grid lines
          drawGrid: (ctx, margins, width, height, transform, gridConfig = null) => {
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            
            if (!gridConfig) return;
            
            const { xPoints = [], yPoints = [] } = gridConfig;
            
            // Vertical grid lines
            for (const x of xPoints) {
              const pos = transform.toCanvas(x, 0);
              ctx.beginPath();
              ctx.moveTo(pos.x, margins.top);
              ctx.lineTo(pos.x, height - margins.bottom);
              ctx.stroke();
            }
            
            // Horizontal grid lines
            for (const y of yPoints) {
              const pos = transform.toCanvas(0, y);
              ctx.beginPath();
              ctx.moveTo(margins.left, pos.y);
              ctx.lineTo(width - margins.right, pos.y);
              ctx.stroke();
            }
          },
        
          // Draw tick marks and labels
          drawTicks: (ctx, margins, width, height, transform, gridConfig = null) => {
            const fontSize = Math.max(10, Math.round(width * 0.02));
            ctx.fillStyle = '#6b7280';
            ctx.font = `${fontSize}px sans-serif`;
            
            if (!gridConfig) return;
            
            const { xPoints = [], yPoints = [] } = gridConfig;
            
            // X-axis ticks
            ctx.textAlign = 'center';
            for (const x of xPoints) {
              const pos = transform.toCanvas(x, 0);
              const label = x % 1 === 0 ? x.toString() : x.toFixed(1);
              ctx.fillText(label, pos.x, height - margins.bottom + 20);
            }
            
            // Y-axis ticks
            ctx.textAlign = 'right';
            for (const y of yPoints) {
              const pos = transform.toCanvas(0, y);
              const label = y % 1 === 0 ? y.toString() : y.toFixed(1);
              ctx.fillText(label, margins.left - 8, pos.y + fontSize/3);
            }
          },
        
          // Draw a curve from data points
          drawCurve: (ctx, points, transform, style = {}) => {
            if (!points || points.length === 0) return;
            
            const {
              color = '#1d4ed8',
              lineWidth = 2,
              dash = []
            } = style;
            
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.setLineDash(dash);
            
            ctx.beginPath();
            let firstPoint = true;
            
            for (const point of points) {
              if (isFinite(point.x) && isFinite(point.y)) {
                const canvasPos = transform.toCanvas(point.x, point.y);
                if (firstPoint) {
                  ctx.moveTo(canvasPos.x, canvasPos.y);
                  firstPoint = false;
                } else {
                  ctx.lineTo(canvasPos.x, canvasPos.y);
                }
              }
            }
            
            ctx.stroke();
            ctx.setLineDash([]); // Reset dash
          },
        
          // Draw L-shaped curve for perfect complements
          drawLShape: (ctx, cornerX, cornerY, maxX, maxY, transform, style = {}) => {
            const {
              color = '#1d4ed8',
              lineWidth = 2
            } = style;
            
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.setLineDash([]);
            
            // Draw horizontal segment from corner to right edge
            const corner = transform.toCanvas(cornerX, cornerY);
            const rightEdge = transform.toCanvas(maxX, cornerY);
            
            ctx.beginPath();
            ctx.moveTo(corner.x, corner.y);
            ctx.lineTo(rightEdge.x, rightEdge.y);
            ctx.stroke();
            
            // Draw vertical segment from corner to top edge
            const topEdge = transform.toCanvas(cornerX, maxY);
            
            ctx.beginPath();
            ctx.moveTo(corner.x, corner.y);
            ctx.lineTo(topEdge.x, topEdge.y);
            ctx.stroke();
          },
        
          // Draw a straight line (e.g., budget/expenditure line)
          drawLine: (ctx, x1, y1, x2, y2, transform, style = {}) => {
            const {
              color = '#dc2626',
              lineWidth = 3,
              dash = []
            } = style;
            
            const pos1 = transform.toCanvas(x1, y1);
            const pos2 = transform.toCanvas(x2, y2);
            
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.setLineDash(dash);
            
            ctx.beginPath();
            ctx.moveTo(pos1.x, pos1.y);
            ctx.lineTo(pos2.x, pos2.y);
            ctx.stroke();
            
            ctx.setLineDash([]); // Reset dash
          },
        
          // Highlight a point with a circle
          highlightPoint: (ctx, x, y, transform, style = {}) => {
            const {
              outerColor = '#dc2626',
              innerColor = '#ffffff',
              outerRadius = 6,
              innerRadius = 3
            } = style;
            
            const pos = transform.toCanvas(x, y);
            
            // Outer circle
            ctx.fillStyle = outerColor;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, outerRadius, 0, 2 * Math.PI);
            ctx.fill();
            
            // Inner circle
            ctx.fillStyle = innerColor;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, innerRadius, 0, 2 * Math.PI);
            ctx.fill();
          },
        
          // Add text label at a point
          addLabel: (ctx, text, x, y, transform, style = {}) => {
            const {
              color = '#374151',
              fontSize = 12,
              fontWeight = 'normal',
              offsetX = 10,
              offsetY = -10,
              align = 'left',
              backgroundColor = 'rgba(255, 255, 255, 0.6)',
              backgroundPadding = 0,
              borderRadius = 0
            } = style;
            
            const pos = transform.toCanvas(x, y);
            
            // Set up font for text metrics
            ctx.font = `${fontWeight} ${fontSize}px sans-serif`;
            
            // Draw background if specified
            if (backgroundColor) {
              const metrics = ctx.measureText(text);
              const textWidth = metrics.width;
              const textHeight = fontSize;
              
              // Calculate background rectangle position and size
              let bgX, bgY, bgWidth, bgHeight;
              
              if (align === 'left') {
                bgX = pos.x + offsetX - backgroundPadding;
                bgY = pos.y + offsetY - textHeight - backgroundPadding;
                bgWidth = textWidth + 2 * backgroundPadding;
                bgHeight = textHeight + 2 * backgroundPadding;
              } else if (align === 'center') {
                bgX = pos.x + offsetX - textWidth/2 - backgroundPadding;
                bgY = pos.y + offsetY - textHeight - backgroundPadding;
                bgWidth = textWidth + 2 * backgroundPadding;
                bgHeight = textHeight + 2 * backgroundPadding;
              } else { // 'right'
                bgX = pos.x + offsetX - textWidth - backgroundPadding;
                bgY = pos.y + offsetY - textHeight - backgroundPadding;
                bgWidth = textWidth + 2 * backgroundPadding;
                bgHeight = textHeight + 2 * backgroundPadding;
              }
              
              // Draw rounded rectangle background
              ctx.fillStyle = backgroundColor;
              if (borderRadius > 0) {
                ctx.beginPath();
                ctx.roundRect(bgX, bgY, bgWidth, bgHeight, borderRadius);
                ctx.fill();
              } else {
                ctx.fillRect(bgX, bgY, bgWidth, bgHeight);
              }
            }
            
            // Draw text - ensure font is set right before drawing
            ctx.fillStyle = color;
            ctx.textAlign = align;
            ctx.font = `${fontWeight} ${fontSize}px sans-serif`;
            ctx.fillText(text, pos.x + offsetX, pos.y + offsetY);
          },
        
          // Set up clipping region
          setupClipping: (ctx, margins, width, height) => {
            ctx.save();
            ctx.beginPath();
            ctx.rect(margins.left, margins.top, 
                     width - margins.left - margins.right, 
                     height - margins.top - margins.bottom);
            ctx.clip();
          },
        
          // Restore clipping
          restoreClipping: (ctx) => {
            ctx.restore();
          },
        
          // Create numeric range array
          createRange: (min = 0.5, max = 5.0, step = 0.1) => {
            const range = [];
            for (let p = min; p <= max; p += step) {
              range.push(Number(p.toFixed(2)));
            }
            return range;
          },
        
          // Generic color interpolation between two hex colors
          // Returns interpolated color as hex string
          interpolateColor: (value, minValue, maxValue, colorStart, colorEnd) => {
            // Clamp value to range
            const t = Math.max(0, Math.min(1, (value - minValue) / (maxValue - minValue)));
        
            // Parse hex colors to RGB
            const parseHex = (hex) => {
              const r = parseInt(hex.slice(1, 3), 16);
              const g = parseInt(hex.slice(3, 5), 16);
              const b = parseInt(hex.slice(5, 7), 16);
              return { r, g, b };
            };
        
            const start = parseHex(colorStart);
            const end = parseHex(colorEnd);
        
            // Linear interpolation
            const r = Math.round(start.r + t * (end.r - start.r));
            const g = Math.round(start.g + t * (end.g - start.g));
            const b = Math.round(start.b + t * (end.b - start.b));
        
            // Convert back to hex
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
          }
        };
        
        // Make available globally
        window.CanvasUtils = CanvasUtils;
    </script>
